<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAGIA — Creative Studio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            overflow-y: scroll;
        }

        body {
            width: 100%;
            min-height: 900vh;
            margin: 0;
            padding: 0;
            background: #000;
            font-family: 'Space Grotesk', sans-serif;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        canvas {
            display: block;
        }

        .logo {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            opacity: 0;
            animation: fadeIn 2s ease forwards;
            animation-delay: 1s;
        }

        .logo img {
            height: 144px;
            width: auto;
        }

        #totem-container {
            position: fixed;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            width: 200px;
            height: 400px;
            z-index: 1100;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        #totem-container.visible {
            opacity: 1;
        }

        /* Works Panels Overlay */
        #works-panels-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 140;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            overflow: hidden;
        }

        #works-panels-overlay.visible {
            opacity: 1;
        }

        .work-panel {
            position: absolute;
            width: 420px;
            height: 260px;
            background: rgba(10, 10, 10, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.25);
            cursor: pointer;
            pointer-events: auto;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }

        .work-panel.left {
            transform: perspective(800px) rotateY(25deg);
            transform-origin: right center;
        }

        .work-panel.right {
            transform: perspective(800px) rotateY(-25deg);
            transform-origin: left center;
        }

        .work-panel:hover {
            border-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.15);
            z-index: 10;
        }

        .work-panel.left:hover {
            transform: perspective(800px) rotateY(0deg) scale(1.05);
        }

        .work-panel.right:hover {
            transform: perspective(800px) rotateY(0deg) scale(1.05);
        }

        .work-panel video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .work-panel-title {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 10px 12px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.95));
            color: white;
            font-size: 9px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .work-panel-corners {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
        }

        .work-panel-corner {
            position: absolute;
            width: 12px;
            height: 12px;
            border-color: rgba(255, 255, 255, 0.4);
            border-style: solid;
            border-width: 0;
            transition: border-color 0.3s ease;
        }

        .work-panel-corner.tl {
            top: -1px;
            left: -1px;
            border-top-width: 1px;
            border-left-width: 1px;
        }

        .work-panel-corner.tr {
            top: -1px;
            right: -1px;
            border-top-width: 1px;
            border-right-width: 1px;
        }

        .work-panel-corner.bl {
            bottom: -1px;
            left: -1px;
            border-bottom-width: 1px;
            border-left-width: 1px;
        }

        .work-panel-corner.br {
            bottom: -1px;
            right: -1px;
            border-bottom-width: 1px;
            border-right-width: 1px;
        }

        .work-panel:hover .work-panel-corner {
            border-color: rgba(255, 255, 255, 0.9);
        }

        .work-panel-line {
            position: absolute;
            background: rgba(255, 255, 255, 0.15);
            pointer-events: none;
        }

        .work-panel-line.vertical {
            width: 1px;
        }

        .work-panel-line.horizontal {
            height: 1px;
        }

        .scroll-hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            color: rgba(255, 255, 255, 0.35);
            font-size: 9px;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeIn 1s ease forwards;
            animation-delay: 2s;
            transition: opacity 0.5s ease;
        }

        .scroll-hint::after {
            content: '';
            display: block;
            width: 1px;
            height: 25px;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.3), transparent);
            margin: 12px auto 0;
            animation: scrollPulse 2s ease infinite;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @keyframes scrollPulse {

            0%,
            100% {
                transform: translateY(0);
                opacity: 0.3;
            }

            50% {
                transform: translateY(5px);
                opacity: 0.6;
            }
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
            background: radial-gradient(ellipse at center, transparent 0%, transparent 60%, rgba(0, 0, 0, 0.4) 100%);
        }

        .work-info-box {
            position: fixed;
            padding: 20px 25px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            pointer-events: none;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.3s ease;
            max-width: 280px;
            backdrop-filter: blur(10px);
        }

        .work-info-box.visible {
            opacity: 1;
        }

        .work-info-title {
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .work-info-desc {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            line-height: 1.5;
            letter-spacing: 0.5px;
        }

        /* Work Detail Page Styles */
        #work-detail-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            display: none;
            overflow-y: auto;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #work-detail-page.visible {
            opacity: 1;
        }

        .work-detail-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 40px;
        }

        .work-detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .work-detail-title {
            font-size: 48px;
            font-weight: 300;
            letter-spacing: 4px;
            color: white;
        }

        .work-detail-close {
            width: 50px;
            height: 50px;
            cursor: pointer;
            position: relative;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        .work-detail-close:hover {
            opacity: 1;
        }

        .work-detail-close::before,
        .work-detail-close::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 30px;
            height: 2px;
            background: white;
        }

        .work-detail-close::before {
            transform: translate(-50%, -50%) rotate(45deg);
        }

        .work-detail-close::after {
            transform: translate(-50%, -50%) rotate(-45deg);
        }

        .work-detail-description {
            font-size: 16px;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 50px;
            max-width: 800px;
        }

        .work-detail-videos {
            display: flex;
            flex-direction: column;
            gap: 40px;
            margin-bottom: 60px;
        }

        .work-video-container {
            position: relative;
            background: #111;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 900px;
        }

        .work-video-container video {
            width: 100%;
            height: auto;
            display: block;
            aspect-ratio: 16 / 9;
            object-fit: contain;
            background: #000;
        }

        .work-detail-info {
            margin-bottom: 40px;
        }

        .work-detail-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .work-detail-meta-item {
            min-width: 120px;
        }

        .work-detail-meta-label {
            font-size: 10px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .work-detail-meta-value {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 0.5px;
        }

        .work-detail-overview {
            font-size: 16px;
            line-height: 2;
            color: rgba(255, 255, 255, 0.75);
            max-width: 900px;
        }

        .work-detail-overview p {
            margin-bottom: 20px;
        }

        /* Hand tracking camera feed */
        #hand-tracking-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 2000;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            overflow: hidden;
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }

        #hand-tracking-container:hover {
            opacity: 1;
        }

        #hand-tracking-container video,
        #hand-tracking-container canvas {
            display: block;
            width: 200px;
            height: 150px;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #hand-tracking-canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        #hand-tracking-status {
            position: absolute;
            bottom: 5px;
            left: 5px;
            font-size: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 2px 6px;
            border-radius: 3px;
        }

        #hand-tracking-toggle {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1999;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 12px;
            font-size: 11px;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #hand-tracking-toggle .hand-icon {
            opacity: 0.9;
        }

        #hand-tracking-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
        }

        #hand-tracking-toggle.active {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.6);
        }
    </style>

    <!-- MediaPipe Hand Tracking -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<body>

    <button id="hand-tracking-toggle" onclick="toggleHandTracking()">HAND CONTROL</button>

    <!-- Audio Toggle -->
    <button id="audio-toggle" onclick="toggleAudioMute()" style="

    <!-- Work Detail Page -->
    <div id="work-detail-page">
        <div class="work-detail-container">
            <div class="work-detail-header">
                <div class="work-detail-title" id="detail-title"></div>
                <div class="work-detail-close" onclick="closeWorkDetail()"></div>

    <!-- Work plane click overlays -->
    <div id="work-overlays"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 60;">
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/fflate.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/RGBELoader.js"></script>

    <script>
        // ============ HAND TRACKING SYSTEM ============
        let handTrackingActive = false;
        let hands = null;
        let previousPinchDistance = null;
        let pinchScrollSpeed = 15; // Scroll speed multiplier
        let videoStream = null;
        let handTrackingLoop = null;

        // Pointer finger mouse control
        let pointerMode = false;
        let lastPointerX = null;
        let lastPointerY = null;
        let smoothPointerX = 0;
        let smoothPointerY = 0;
        let pointerCursor = null;
        let hoveredElement = null;
        let pointerClickCooldown = false;

        // Z-axis push detection for click
        let previousIndexZ = null;
        let zPushHistory = [];
        let pushClickCooldown = false;

        // Create virtual cursor element
        function createPointerCursor() {
            if (pointerCursor) return;
            pointerCursor = document.createElement('div');
            pointerCursor.id = 'hand-pointer-cursor';
            pointerCursor.style.cssText = `
                position: fixed;
                width: 24px;
                height: 24px;
                border: 2px solid white;
                border-radius: 50%;
                pointer-events: none;
                z-index: 10000;
                display: none;
                transform: translate(-50%, -50%);
                transition: transform 0.05s ease-out;
                box-shadow: 0 0 10px rgba(255,255,255,0.5);
            `;
            // Inner dot
            const innerDot = document.createElement('div');
            innerDot.style.cssText = `
                position: absolute;
                top: 50%;
                left: 50%;
                width: 6px;
                height: 6px;
                background: white;
                border-radius: 50%;
                transform: translate(-50%, -50%);
            `;
            pointerCursor.appendChild(innerDot);
            document.body.appendChild(pointerCursor);
        }

        function showPointerCursor(x, y) {
            if (!pointerCursor) createPointerCursor();
            pointerCursor.style.display = 'block';
            pointerCursor.style.left = x + 'px';
            pointerCursor.style.top = y + 'px';
        }

        function hidePointerCursor() {
            if (pointerCursor) {
                pointerCursor.style.display = 'none';
            }
            // Reset any hovered element
            if (hoveredElement) {
                hoveredElement.dispatchEvent(new MouseEvent('mouseleave', { bubbles: true }));
                hoveredElement = null;
            }
        }

        function isFingerExtended(landmarks, fingerTip, fingerPip) {
            // Check if finger is extended by comparing tip Y to pip Y (lower Y = higher on screen = extended)
            // Also check distance from wrist
            const tip = landmarks[fingerTip];
            const pip = landmarks[fingerPip];
            const wrist = landmarks[0];

            // For vertical check (tip should be above pip when extended)
            const tipHigher = tip.y < pip.y;

            // Distance from wrist to tip vs wrist to pip
            const tipDist = Math.sqrt(Math.pow(tip.x - wrist.x, 2) + Math.pow(tip.y - wrist.y, 2));
            const pipDist = Math.sqrt(Math.pow(pip.x - wrist.x, 2) + Math.pow(pip.y - wrist.y, 2));

            return tipHigher && tipDist > pipDist * 1.1;
        }

        function isOnlyIndexExtended(landmarks) {
            // Finger landmarks: 
            // Index: tip=8, pip=6
            // Middle: tip=12, pip=10
            // Ring: tip=16, pip=14
            // Pinky: tip=20, pip=18
            // Thumb: tip=4, ip=3

            const indexExtended = isFingerExtended(landmarks, 8, 6);
            const middleExtended = isFingerExtended(landmarks, 12, 10);
            const ringExtended = isFingerExtended(landmarks, 16, 14);
            const pinkyExtended = isFingerExtended(landmarks, 20, 18);

            // Thumb check is different - compare x distance
            const thumbTip = landmarks[4];
            const thumbIp = landmarks[3];
            const thumbExtended = Math.abs(thumbTip.x - landmarks[0].x) > Math.abs(thumbIp.x - landmarks[0].x) * 1.2;

            return indexExtended && !middleExtended && !ringExtended && !pinkyExtended && !thumbExtended;
        }

        function isIndexAndMiddleExtended(landmarks) {
            const indexExtended = isFingerExtended(landmarks, 8, 6);
            const middleExtended = isFingerExtended(landmarks, 12, 10);
            const ringExtended = isFingerExtended(landmarks, 16, 14);
            const pinkyExtended = isFingerExtended(landmarks, 20, 18);

            // Thumb check
            const thumbTip = landmarks[4];
            const thumbIp = landmarks[3];
            const thumbExtended = Math.abs(thumbTip.x - landmarks[0].x) > Math.abs(thumbIp.x - landmarks[0].x) * 1.2;

            return indexExtended && middleExtended && !ringExtended && !pinkyExtended && !thumbExtended;
        }

        function areFingersGlued(landmarks) {
            // Check if index (8) and middle (12) fingertips are close together
            const indexTip = landmarks[8];
            const middleTip = landmarks[12];

            const dx = indexTip.x - middleTip.x;
            const dy = indexTip.y - middleTip.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            // Debug - log distance to help calibrate
            // console.log('Finger distance:', distance.toFixed(3));

            // Threshold for "glued" - fingers are close (increased from 0.05)
            return distance < 0.08;
        }

        function handlePointerMove(x, y) {
            // Smooth the pointer movement
            smoothPointerX += (x - smoothPointerX) * 0.3;
            smoothPointerY += (y - smoothPointerY) * 0.3;

            showPointerCursor(smoothPointerX, smoothPointerY);

            // Find element under cursor
            const elementUnder = document.elementFromPoint(smoothPointerX, smoothPointerY);

            if (elementUnder !== hoveredElement) {
                // Mouse leave old element
                if (hoveredElement) {
                    hoveredElement.dispatchEvent(new MouseEvent('mouseleave', {
                        bubbles: true,
                        clientX: smoothPointerX,
                        clientY: smoothPointerY
                    }));
                    hoveredElement.dispatchEvent(new MouseEvent('mouseout', {
                        bubbles: true,
                        clientX: smoothPointerX,
                        clientY: smoothPointerY
                    }));
                }

                // Mouse enter new element
                if (elementUnder) {
                    elementUnder.dispatchEvent(new MouseEvent('mouseenter', {
                        bubbles: true,
                        clientX: smoothPointerX,
                        clientY: smoothPointerY
                    }));
                    elementUnder.dispatchEvent(new MouseEvent('mouseover', {
                        bubbles: true,
                        clientX: smoothPointerX,
                        clientY: smoothPointerY
                    }));
                }

                hoveredElement = elementUnder;
            }

            // Always dispatch mousemove
            if (elementUnder) {
                elementUnder.dispatchEvent(new MouseEvent('mousemove', {
                    bubbles: true,
                    clientX: smoothPointerX,
                    clientY: smoothPointerY
                }));
            }
        }

        function handlePointerClick() {
            if (pointerClickCooldown) return;

            // Hide cursor temporarily to get element underneath
            if (pointerCursor) pointerCursor.style.display = 'none';
            const elementUnder = document.elementFromPoint(smoothPointerX, smoothPointerY);
            if (pointerCursor) pointerCursor.style.display = 'block';

            console.log('Click attempt at', smoothPointerX, smoothPointerY, 'element:', elementUnder);

            if (elementUnder) {
                // Visual feedback
                if (pointerCursor) {
                    pointerCursor.style.transform = 'translate(-50%, -50%) scale(0.8)';
                    pointerCursor.style.background = 'rgba(100, 255, 150, 0.3)';
                    setTimeout(() => {
                        if (pointerCursor) {
                            pointerCursor.style.transform = 'translate(-50%, -50%) scale(1)';
                            pointerCursor.style.background = 'transparent';
                        }
                    }, 200);
                }

                // Find clickable element (search up the DOM tree)
                let clickTarget = elementUnder;
                let clicked = false;
                let attempts = 0;

                while (clickTarget && attempts < 10 && !clicked) {
                    // Check for work-detail-close button
                    if (clickTarget.classList && clickTarget.classList.contains('work-detail-close')) {
                        console.log('Closing work detail via hand gesture');
                        closeWorkDetail();
                        clicked = true;
                        break;
                    }

                    // Check for work-panel
                    if (clickTarget.classList && clickTarget.classList.contains('work-panel')) {
                        const workIndex = parseInt(clickTarget.dataset.workIndex);
                        if (!isNaN(workIndex)) {
                            console.log('Opening work', workIndex, 'via hand gesture');
                            openWorkDetail(workIndex);
                            clicked = true;
                            break;
                        }
                    }

                    // Check for onclick attribute
                    if (clickTarget.onclick) {
                        clickTarget.onclick();
                        console.log('onclick() called on', clickTarget);
                        clicked = true;
                        break;
                    }

                    clickTarget = clickTarget.parentElement;
                    attempts++;
                }

                // Fallback: try direct click
                if (!clicked) {
                    if (typeof elementUnder.click === 'function') {
                        elementUnder.click();
                        console.log('Fallback direct click() called');
                    }
                }

                // Cooldown to prevent multiple clicks
                pointerClickCooldown = true;
                setTimeout(() => { pointerClickCooldown = false; }, 800);
            }
        }

        function toggleHandTracking() {
            const btn = document.getElementById('hand-tracking-toggle');
            const container = document.getElementById('hand-tracking-container');

            if (!handTrackingActive) {
                // Start hand tracking
                btn.classList.add('active');
                btn.textContent = 'STARTING...';
                container.style.display = 'block';
                handTrackingActive = true;
                initHandTracking();
            } else {
                // Stop hand tracking
                btn.classList.remove('active');
                btn.textContent = 'HAND CONTROL';
                container.style.display = 'none';
                handTrackingActive = false;
                stopHandTracking();
            }
        }

        async function initHandTracking() {
            const videoElement = document.getElementById('hand-tracking-video');
            const canvasElement = document.getElementById('hand-tracking-canvas');
            const statusElement = document.getElementById('hand-tracking-status');
            const btn = document.getElementById('hand-tracking-toggle');
            const canvasCtx = canvasElement.getContext('2d');

            // Set canvas size
            canvasElement.width = 200;
            canvasElement.height = 150;

            statusElement.textContent = 'Finding cameras...';

            try {
                // First enumerate devices to find video inputs
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(d => d.kind === 'videoinput');

                console.log('Available video devices:', videoDevices);

                if (videoDevices.length === 0) {
                    throw new Error('No video devices found');
                }

                // Log all devices for debugging
                videoDevices.forEach((device, i) => {
                    console.log(`Camera ${i}: ${device.label || 'Unknown'} (${device.deviceId.substring(0, 8)}...)`);
                });

                statusElement.textContent = 'Starting camera...';

                // Try each video device until one works
                let streamStarted = false;
                let lastError = null;

                for (let i = 0; i < videoDevices.length && !streamStarted; i++) {
                    try {
                        console.log(`Trying camera ${i}: ${videoDevices[i].label || 'Unknown'}`);
                        statusElement.textContent = `Trying camera ${i + 1}/${videoDevices.length}...`;

                        // Request specific device
                        videoStream = await navigator.mediaDevices.getUserMedia({
                            video: {
                                deviceId: { exact: videoDevices[i].deviceId },
                                width: { ideal: 640 },
                                height: { ideal: 480 }
                            },
                            audio: false
                        });

                        videoElement.srcObject = videoStream;
                        videoElement.muted = true;
                        videoElement.playsInline = true;
                        videoElement.setAttribute('playsinline', '');

                        // Wait for video to be ready with longer timeout
                        await new Promise((resolve, reject) => {
                            const timeout = setTimeout(() => {
                                reject(new Error('Video load timeout for device ' + i));
                            }, 15000); // 15 second timeout

                            videoElement.onloadedmetadata = () => {
                                clearTimeout(timeout);
                                videoElement.play()
                                    .then(resolve)
                                    .catch(reject);
                            };

                            videoElement.onerror = (e) => {
                                clearTimeout(timeout);
                                reject(e);
                            };
                        });

                        console.log(`Camera ${i} started successfully!`);
                        streamStarted = true;

                    } catch (err) {
                        console.log(`Camera ${i} failed:`, err.message);
                        lastError = err;
                        // Stop any partial stream
                        if (videoStream) {
                            videoStream.getTracks().forEach(track => track.stop());
                            videoStream = null;
                        }
                    }
                }

                if (!streamStarted) {
                    throw lastError || new Error('Could not start any camera');
                }

                statusElement.textContent = 'Loading hand model...';

                // Initialize MediaPipe Hands
                hands = new Hands({
                    locateFile: (file) => {
                        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                    }
                });

                hands.setOptions({
                    maxNumHands: 1,
                    modelComplexity: 0,
                    minDetectionConfidence: 0.5,
                    minTrackingConfidence: 0.5
                });

                hands.onResults(function (results) {
                    onHandResults(results, canvasCtx, canvasElement, statusElement);
                });

                // Wait for model to initialize
                await hands.initialize();

                btn.textContent = 'HAND CONTROL ON';
                statusElement.textContent = 'Hand tracking ready';

                // Start processing frames
                processFrame(videoElement);

            } catch (err) {
                console.error('Hand tracking error:', err);
                statusElement.textContent = 'Error: ' + err.message;
                btn.textContent = 'HAND CONTROL';
                btn.classList.remove('active');
                handTrackingActive = false;

                // Show user-friendly error
                if (err.name === 'NotAllowedError') {
                    alert('Camera permission denied. Please allow camera access in your browser settings and try again.');
                } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
                    alert('No camera found. Please connect a camera and try again.');
                } else if (err.name === 'NotReadableError' || err.name === 'TrackStartError') {
                    alert('Camera is being used by another application. Please close other apps using the camera and try again.');
                } else {
                    alert('Failed to start hand tracking: ' + err.message + '\n\nCheck the browser console (F12) for more details.');
                }

                stopHandTracking();
            }
        }

        function processFrame(videoElement) {
            if (!handTrackingActive || !hands) return;

            if (videoElement.readyState >= 2) {
                hands.send({ image: videoElement }).then(() => {
                    if (handTrackingActive) {
                        handTrackingLoop = requestAnimationFrame(() => processFrame(videoElement));
                    }
                }).catch(err => {
                    console.error('Hand detection error:', err);
                    if (handTrackingActive) {
                        handTrackingLoop = requestAnimationFrame(() => processFrame(videoElement));
                    }
                });
            } else {
                handTrackingLoop = requestAnimationFrame(() => processFrame(videoElement));
            }
        }

        function onHandResults(results, canvasCtx, canvasElement, statusElement) {
            // Clear canvas
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];

                // Check gestures
                const onlyIndexUp = isOnlyIndexExtended(landmarks);
                const indexAndMiddleUp = isIndexAndMiddleExtended(landmarks);
                const fingersGlued = indexAndMiddleUp && areFingersGlued(landmarks);

                // Get thumb tip (4) and index finger tip (8)
                const thumbTip = landmarks[4];
                const indexTip = landmarks[8];
                const middleTip = landmarks[12];

                // Calculate distance between thumb and index finger
                const dx = thumbTip.x - indexTip.x;
                const dy = thumbTip.y - indexTip.y;
                const pinchDistance = Math.sqrt(dx * dx + dy * dy);

                if (onlyIndexUp || indexAndMiddleUp) {
                    // POINTER MODE - index finger (or index+middle) controls mouse
                    pointerMode = true;
                    previousPinchDistance = null; // Reset scroll tracking

                    // Use index finger position for cursor
                    // Mirror X because video is flipped
                    const screenX = (1 - indexTip.x) * window.innerWidth;
                    const screenY = indexTip.y * window.innerHeight;

                    handlePointerMove(screenX, screenY);

                    // Z-axis push detection for click
                    // Lower Z value = closer to camera
                    const currentZ = indexTip.z;

                    // Track Z history for velocity calculation
                    zPushHistory.push(currentZ);
                    if (zPushHistory.length > 5) {
                        zPushHistory.shift(); // Keep last 5 frames
                    }

                    // Check for push (rapid decrease in Z = moving toward camera)
                    let pushDetected = false;
                    if (zPushHistory.length >= 3 && !pushClickCooldown) {
                        // Calculate Z velocity (negative = pushing toward camera)
                        const oldZ = zPushHistory[0];
                        const newZ = zPushHistory[zPushHistory.length - 1];
                        const zVelocity = newZ - oldZ;

                        // Threshold for push detection (negative velocity = toward camera)
                        if (zVelocity < -0.03) {
                            pushDetected = true;
                            handlePointerClick();
                            pushClickCooldown = true;
                            setTimeout(() => { pushClickCooldown = false; }, 600);
                            console.log('Push detected! Z velocity:', zVelocity.toFixed(4));
                        }
                    }

                    // Draw visuals
                    if (pushDetected) {
                        drawPushClick(canvasCtx, landmarks, canvasElement.width, canvasElement.height);
                        statusElement.textContent = 'CLICK!';
                    } else {
                        drawPointerFingertip(canvasCtx, landmarks, canvasElement.width, canvasElement.height);
                        statusElement.textContent = 'Pointer (push to click)';
                    }
                } else {
                    // SCROLL MODE or neutral
                    if (pointerMode) {
                        // Was in pointer mode, now exiting
                        hidePointerCursor();
                        pointerMode = false;
                        zPushHistory = []; // Reset Z tracking
                    }

                    // Draw minimal fingertip graphics
                    drawFingertips(canvasCtx, landmarks, canvasElement.width, canvasElement.height);

                    // Cumulative scroll - only scroll DOWN when fingers spread apart
                    if (previousPinchDistance !== null) {
                        const distanceChange = pinchDistance - previousPinchDistance;

                        // Only scroll when fingers are spreading (positive change)
                        if (distanceChange > 0.008) {
                            const scrollAmount = distanceChange * pinchScrollSpeed * 150;
                            window.scrollBy(0, scrollAmount);
                        }
                    }

                    previousPinchDistance = pinchDistance;
                    statusElement.textContent = 'Spread to scroll ' + (pinchDistance * 100).toFixed(0) + '%';
                }
            } else {
                previousPinchDistance = null;
                if (pointerMode) {
                    hidePointerCursor();
                    pointerMode = false;
                }
                statusElement.textContent = 'No hand detected';
            }

            canvasCtx.restore();
        }

        function drawClickGesture(ctx, landmarks, width, height) {
            // Draw index and middle fingertips merged/glued with click effect
            const indexTip = landmarks[8];
            const middleTip = landmarks[12];

            // Calculate center between the two fingers
            const centerX = (1 - (indexTip.x + middleTip.x) / 2) * width;
            const centerY = ((indexTip.y + middleTip.y) / 2) * height;

            // Draw merged circle with pulse effect
            ctx.beginPath();
            ctx.arc(centerX, centerY, 15, 0, 2 * Math.PI);
            ctx.fillStyle = 'rgba(100, 255, 150, 0.5)';
            ctx.fill();
            ctx.strokeStyle = '#64ff96';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Inner dot
            ctx.beginPath();
            ctx.arc(centerX, centerY, 5, 0, 2 * Math.PI);
            ctx.fillStyle = '#64ff96';
            ctx.fill();
        }

        function drawTwoFingerPointer(ctx, landmarks, width, height) {
            // Draw index and middle fingertips 
            const indexTip = landmarks[8];
            const middleTip = landmarks[12];

            const ix = (1 - indexTip.x) * width;
            const iy = indexTip.y * height;
            const mx = (1 - middleTip.x) * width;
            const my = middleTip.y * height;

            // Index finger - blue
            ctx.beginPath();
            ctx.arc(ix, iy, 10, 0, 2 * Math.PI);
            ctx.strokeStyle = 'rgba(100, 200, 255, 0.9)';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(ix, iy, 3, 0, 2 * Math.PI);
            ctx.fillStyle = '#64c8ff';
            ctx.fill();

            // Middle finger - blue
            ctx.beginPath();
            ctx.arc(mx, my, 10, 0, 2 * Math.PI);
            ctx.strokeStyle = 'rgba(100, 200, 255, 0.9)';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(mx, my, 3, 0, 2 * Math.PI);
            ctx.fillStyle = '#64c8ff';
            ctx.fill();

            // Draw other fingertips dimmed
            const otherTips = [4, 16, 20];
            otherTips.forEach(function (index) {
                const landmark = landmarks[index];
                const tx = (1 - landmark.x) * width;
                const ty = landmark.y * height;

                ctx.beginPath();
                ctx.arc(tx, ty, 6, 0, 2 * Math.PI);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 1;
                ctx.stroke();
            });
        }

        function drawPushClick(ctx, landmarks, width, height) {
            // Draw index fingertip with push/click effect
            const indexTip = landmarks[8];
            const x = (1 - indexTip.x) * width;
            const y = indexTip.y * height;

            // Outer pulse ring
            ctx.beginPath();
            ctx.arc(x, y, 18, 0, 2 * Math.PI);
            ctx.strokeStyle = 'rgba(100, 255, 150, 0.8)';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Inner filled circle
            ctx.beginPath();
            ctx.arc(x, y, 10, 0, 2 * Math.PI);
            ctx.fillStyle = 'rgba(100, 255, 150, 0.6)';
            ctx.fill();

            // Center dot
            ctx.beginPath();
            ctx.arc(x, y, 4, 0, 2 * Math.PI);
            ctx.fillStyle = '#64ff96';
            ctx.fill();
        }

        function drawPointerFingertip(ctx, landmarks, width, height) {
            // Only draw index fingertip with special highlight
            const indexTip = landmarks[8];
            const x = (1 - indexTip.x) * width;
            const y = indexTip.y * height;

            // Outer glowing circle
            ctx.beginPath();
            ctx.arc(x, y, 12, 0, 2 * Math.PI);
            ctx.strokeStyle = 'rgba(100, 200, 255, 0.9)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Inner dot
            ctx.beginPath();
            ctx.arc(x, y, 4, 0, 2 * Math.PI);

            ctx.fill();

            // Draw other fingertips dimmed
            const otherTips = [4, 12, 16, 20];
            otherTips.forEach(function (index) {

                ctx.lineWidth = 1;

            });
        }

        function drawFingertips(ctx, landmarks, width, height) {
            // Fingertip indices: thumb=4, index=8, middle=12, ring=16, pinky=20
            const fingertips = [4, 8, 12, 16, 20];

            fingertips.forEach(function (index) {
                const landmark = landmarks[index];
                const x = (1 - landmark.x) * width;
                const y = landmark.y * height;

                // Outer circle (ring)
                ctx.beginPath();
                ctx.arc(x, y, 10, 0, 2 * Math.PI);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // Inner dot
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, 2 * Math.PI);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
            });
        }

        function fadeAudio(audio, from, to, duration, onComplete) {
            const startTime = performance.now();
            audio.volume = Math.max(0, Math.min(1, from));

            function tick() {
                const elapsed = performance.now() - startTime;
                const progress = Math.min(1, elapsed / duration);
                const eased = progress < 0.5
                    ? 2 * progress * progress
                    : 1 - Math.pow(-2 * progress + 2, 2) / 2;
                audio.volume = Math.max(0, Math.min(1, from + (to - from) * eased));

                if (progress < 1) {
                    requestAnimationFrame(tick);
                } else if (onComplete) {
                    onComplete();
                }
            }
            requestAnimationFrame(tick);
        }

            scan: { duration: 4000, ringWidth: 0.5, maxRadius: 250 },
            animation: { cameraDuration: 5500, cameraDelay: 3500 }
        };

        // Simplex Noise
        class SimplexNoise {
            constructor(seed = Math.random()) {
                this.p = new Uint8Array(256);
                for (let i = 0; i < 256; i++) this.p[i] = i;
                let s = seed * 2147483647;
                for (let i = 255; i > 0; i--) {
                    s = (s * 16807) % 2147483647;
                    const j = Math.floor((s / 2147483647) * (i + 1));
                    [this.p[i], this.p[j]] = [this.p[j], this.p[i]];
                }
                this.perm = new Uint8Array(512);
                for (let i = 0; i < 512; i++) this.perm[i] = this.p[i & 255];
            }

            noise2D(x, y) {
                const F2 = 0.5 * (Math.sqrt(3) - 1), G2 = (3 - Math.sqrt(3)) / 6;
                let s = (x + y) * F2, i = Math.floor(x + s), j = Math.floor(y + s);
                let t = (i + j) * G2, x0 = x - (i - t), y0 = y - (j - t);
                let i1, j1;
                if (x0 > y0) { i1 = 1; j1 = 0; } else { i1 = 0; j1 = 1; }
                let x1 = x0 - i1 + G2, y1 = y0 - j1 + G2, x2 = x0 - 1 + 2 * G2, y2 = y0 - 1 + 2 * G2;
                let ii = i & 255, jj = j & 255, n0 = 0, n1 = 0, n2 = 0;
                let t0 = 0.5 - x0 * x0 - y0 * y0;
                if (t0 >= 0) { t0 *= t0; n0 = t0 * t0 * this.grad(this.perm[ii + this.perm[jj]], x0, y0); }
                let t1 = 0.5 - x1 * x1 - y1 * y1;
                if (t1 >= 0) { t1 *= t1; n1 = t1 * t1 * this.grad(this.perm[ii + i1 + this.perm[jj + j1]], x1, y1); }
                let t2 = 0.5 - x2 * x2 - y2 * y2;
                if (t2 >= 0) { t2 *= t2; n2 = t2 * t2 * this.grad(this.perm[ii + 1 + this.perm[jj + 1]], x2, y2); }
                return 70 * (n0 + n1 + n2);
            }

            grad(hash, x, y) {
                const h = hash & 7, u = h < 4 ? x : y, v = h < 4 ? y : x;
                return ((h & 1) ? -u : u) + ((h & 2) ? -2 * v : 2 * v);
            }
        }

        const noise = new SimplexNoise(42), noise2 = new SimplexNoise(123), noise3 = new SimplexNoise(789);

        // Open work detail page
        function openWorkDetail(workIndex) {
            const work = WORKS_DATA[workIndex];
            if (!work) return;

            const detailPage = document.getElementById('work-detail-page');
            const titleEl = document.getElementById('detail-title');
            const videosEl = document.getElementById('detail-videos');
            const infoEl = document.getElementById('detail-info');

            // Set title
            titleEl.textContent = work.title;

            // Clear and add videos (big, vertical layout)
            videosEl.innerHTML = '';
            work.videos.forEach(function (videoFile, idx) {
                var container = document.createElement('div');
                container.className = 'work-video-container';

                var video = document.createElement('video');
                video.src = work.folder + '/' + videoFile;
                video.controls = true;
                video.loop = true;
                video.muted = true;
                video.playsInline = true;
                video.preload = 'metadata';
                video.setAttribute('playsinline', '');
                video.setAttribute('webkit-playsinline', '');

                // Add cover image as poster
                // videoFile is like 'video1.mp4', 'video2.mp4', etc.
                var videoNum = videoFile.match(/video(\d+)/);
                if (videoNum) {
                    var coverPath = 'covers/' + videoNum[1] + '.png';
                    video.poster = coverPath;
                    console.log('Setting poster for', videoFile, ':', coverPath);
                }

                container.appendChild(video);
                videosEl.appendChild(container);
            });

            // Clear info section
            infoEl.innerHTML = '';

            // Fetch and parse text file if it exists
            if (work.descFile) {
                var textUrl = work.folder + '/' + work.descFile;
                console.log('Fetching text file:', textUrl);
                fetch(textUrl)
                    .then(function (response) {
                        console.log('Response status:', response.status);
                        if (!response.ok) throw new Error('File not found: ' + response.status);
                        return response.text();
                    })
                    .then(function (text) {
                        console.log('Raw text:', text);

                        // Parse the text file
                        var lines = text.split('\n');
                        var metaItems = [];
                        var overviewLines = [];
                        var passedMeta = false;

                        for (var i = 0; i < lines.length; i++) {
                            var line = lines[i];
                            var trimmed = line.trim();

                            if (!trimmed) continue;

                            // Skip "Overview" header
                            if (trimmed.toLowerCase() === 'overview') {
                                passedMeta = true;
                                continue;
                            }

                            // Try to match KEY   Value pattern (3+ spaces between)
                            var spaceIndex = trimmed.search(/\s{3,}/);
                            if (spaceIndex > 0 && !passedMeta) {
                                var label = trimmed.substring(0, spaceIndex).trim();
                                var value = trimmed.substring(spaceIndex).trim();
                                if (label === label.toUpperCase() && label.length > 0) {
                                    metaItems.push({ label: label, value: value });
                                    continue;
                                }
                            }

                            // After we have meta items, everything else is overview
                            if (metaItems.length > 0 || passedMeta) {
                                passedMeta = true;
                                overviewLines.push(trimmed);
                            }
                        }

                        console.log('Meta items:', metaItems);
                        console.log('Overview lines:', overviewLines);

                        // Build and append meta section
                        if (metaItems.length > 0) {
                            var metaDiv = document.createElement('div');
                            metaDiv.className = 'work-detail-meta';

                            for (var j = 0; j < metaItems.length; j++) {
                                var item = metaItems[j];
                                var itemDiv = document.createElement('div');
                                itemDiv.className = 'work-detail-meta-item';

                                var labelDiv = document.createElement('div');
                                labelDiv.className = 'work-detail-meta-label';
                                labelDiv.textContent = item.label;

                                var valueDiv = document.createElement('div');
                                valueDiv.className = 'work-detail-meta-value';
                                valueDiv.textContent = item.value;

                                itemDiv.appendChild(labelDiv);
                                itemDiv.appendChild(valueDiv);
                                metaDiv.appendChild(itemDiv);
                            }

                            infoEl.appendChild(metaDiv);
                            console.log('Added meta div');
                        }

                        // Build and append overview section
                        if (overviewLines.length > 0) {
                            var overviewDiv = document.createElement('div');
                            overviewDiv.className = 'work-detail-overview';

                            for (var k = 0; k < overviewLines.length; k++) {
                                var p = document.createElement('p');
                                p.textContent = overviewLines[k];
                                overviewDiv.appendChild(p);
                            }

                            infoEl.appendChild(overviewDiv);
                            console.log('Added overview div');
                        }
                    })
                    .catch(function (e) {
                        console.error('Error loading text file:', e);
                    });
            }

            // Show the page
            detailPage.style.display = 'block';
            setTimeout(() => {
                detailPage.classList.add('visible');
            }, 10);

            // Pause all work preview videos
            window.galleryData.workPlanes.forEach(wp => {
                if (wp.video && wp.isPlaying) {
                    wp.video.pause();
                    wp.isPlaying = false;
                }
            });
        }

        function onMouseMove(event) {
            // Normalize mouse position to -1 to 1
            mousePos.x = (event.clientX / window.innerWidth) * 2 - 1;
            mousePos.y = -(event.clientY / window.innerHeight) * 2 + 1;
        }

        function onScroll() {
            // Initialize audio on first user interaction
            if (!audioInitialized) initAudio();

            const scrollHeight = document.body.scrollHeight - window.innerHeight;
            const scrollTop = window.scrollY || window.pageYOffset;
            scrollProgress = Math.min(1, Math.max(0, scrollTop / scrollHeight));

            // Detect any scroll movement and trigger new wave (only during descent phase - first 40% of scroll)
            const scrollDelta = Math.abs(scrollTop - lastScrollTop);
            if (scrollDelta > 3 && scrollProgress < 0.4) {
                // Add new scan wave with its glow ring
                const ring = createGlowRing();
                scanWaves.push({
                    radius: 0,
                    maxRadius: 300,
                    speed: 80,
                    ring: ring
                });
            }
            lastScrollTop = scrollTop;

            // Update reveal progress based on max scan radius reached (only during descent)
            if (scrollProgress < 0.4) {
                revealProgress = Math.min(1, revealProgress + scrollDelta * 0.002);
            }

            // Fade out scroll hint as user scrolls
            const scrollHint = document.querySelector('.scroll-hint');
            if (scrollHint) {
                scrollHint.style.opacity = Math.max(0, 1 - scrollProgress * 5);
            }
        }

        function createStarField() {
            const geo = new THREE.BufferGeometry();
            const count = 8000;
            const pos = new Float32Array(count * 3), sizes = new Float32Array(count);
            for (let i = 0; i < count; i++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.random() * Math.PI * 0.55;
                const r = 120 + Math.random() * 80;
                pos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                pos[i * 3 + 1] = r * Math.cos(phi) - 5;
                pos[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
                sizes[i] = Math.random() * 4.0 + 1.5;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

            const mat = new THREE.ShaderMaterial({
                uniforms: {
                    starOpacity: { value: 0.0 }
                },
                vertexShader: `
                    attribute float size;
                    varying float vAlpha;
                    void main() {
                        vec4 mv = modelViewMatrix * vec4(position, 1.0);
                        gl_Position = projectionMatrix * mv;
                        gl_PointSize = size * (180.0 / -mv.z);
                        vAlpha = smoothstep(250.0, 50.0, -mv.z);
                    }
                `,
                fragmentShader: `
                    uniform float starOpacity;
                    varying float vAlpha;
                    void main() {
                        vec2 c = gl_PointCoord - 0.5;
                        float d = length(c);
                        if (d > 0.5) discard;
                        float alpha = smoothstep(0.5, 0.0, d) * vAlpha * starOpacity;
                        gl_FragColor = vec4(1.0, 1.0, 1.0, alpha);
                    }
                `,
                transparent: true, depthWrite: false, fog: false
            });
            starField = new THREE.Points(geo, mat);
            scene.add(starField);
        }

        function createGridLines(geometry) {
            const pos = geometry.attributes.position.array;
            const segmentsX = Math.round(Math.sqrt(pos.length / 3)) - 1;
            const segmentsY = segmentsX;
            const vertices = [];
            const width = segmentsX + 1;

            for (let j = 0; j <= segmentsY; j++) {
                for (let i = 0; i <= segmentsX; i++) {
                    const idx = (j * width + i) * 3;
                    const x = pos[idx], y = pos[idx + 1], z = pos[idx + 2];

                    if (i < segmentsX) {
                        const nextIdx = (j * width + i + 1) * 3;
                        vertices.push(x, y, z, pos[nextIdx], pos[nextIdx + 1], pos[nextIdx + 2]);
                    }
                    if (j < segmentsY) {
                        const nextIdx = ((j + 1) * width + i) * 3;
                        vertices.push(x, y, z, pos[nextIdx], pos[nextIdx + 1], pos[nextIdx + 2]);
                    }
                }
            }

            const lineGeo = new THREE.BufferGeometry();
            lineGeo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            return lineGeo;
        }

        function createDome() {
            const geo = new THREE.SphereGeometry(CONFIG.dome.radius, CONFIG.dome.widthSegments, CONFIG.dome.heightSegments, 0, Math.PI * 2, 0, Math.PI / 2);

            // Solid dome - pitch black, high contrast glass-like reflections with dissolve effect
            const solidMat = new THREE.ShaderMaterial({
                uniforms: {
                    cameraPos: { value: camera.position },
                    lightDir: { value: LIGHT_DIR },
                    dissolveProgress: { value: 0.0 },
                    time: { value: 0.0 }
                },
                vertexShader: `
                    varying vec3 vNormal, vViewDir, vWorldPos;
                    varying vec2 vUv;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        vec4 wp = modelMatrix * vec4(position, 1.0);
                        vWorldPos = wp.xyz;
                        vViewDir = normalize(cameraPosition - wp.xyz);
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform vec3 lightDir;
                    uniform float dissolveProgress;
                    uniform float time;
                    varying vec3 vNormal, vViewDir, vWorldPos;
                    varying vec2 vUv;
                    
                    // Noise function for dissolve pattern
                    float hash(vec2 p) {
                        return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
                    }
                    
                    float noise(vec2 p) {
                        vec2 i = floor(p);
                        vec2 f = fract(p);
                        f = f * f * (3.0 - 2.0 * f);
                        float a = hash(i);
                        float b = hash(i + vec2(1.0, 0.0));
                        float c = hash(i + vec2(0.0, 1.0));
                        float d = hash(i + vec2(1.0, 1.0));
                        return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
                    }
                    
                    float fbm(vec2 p) {
                        float v = 0.0;
                        float a = 0.5;
                        for (int i = 0; i < 4; i++) {
                            v += a * noise(p);
                            p *= 2.0;
                            a *= 0.5;
                        }
                        return v;
                    }
                    
                    void main() {
                        // Create dissolve noise pattern
                        vec2 noiseCoord = vWorldPos.xz * 0.5 + vWorldPos.y * 0.3;
                        float noiseVal = fbm(noiseCoord * 3.0 + time * 0.5);
                        
                        // Add vertical bias - dissolve from top
                        float heightBias = (vWorldPos.y / 10.0);
                        noiseVal = noiseVal * 0.6 + heightBias * 0.4;
                        
                        // Dissolve threshold
                        float threshold = dissolveProgress * 1.4;
                        
                        // Discard dissolved pixels
                        if (noiseVal < threshold) {
                            discard;
                        }
                        
                        // Edge glow at dissolve boundary
                        float edgeDist = noiseVal - threshold;
                        float edgeGlow = smoothstep(0.15, 0.0, edgeDist);
                        vec3 glowColor = vec3(0.7, 0.7, 0.75);
                        
                        // Original dome shading
                        float fresnel = pow(1.0 - max(dot(vViewDir, vNormal), 0.0), 3.0);
                        float specular = pow(max(dot(reflect(-lightDir, vNormal), vViewDir), 0.0), 128.0);
                        
                        vec3 col = vec3(0.0);
                        col += vec3(specular * 0.8);
                        col += vec3(fresnel * 0.15);
                        
                        // Add edge glow
                        col += glowColor * edgeGlow * 2.0;
                        
                        gl_FragColor = vec4(col, 0.95);
                    }
                `,
                transparent: true, side: THREE.FrontSide, depthWrite: true
            });
            domeSolid = new THREE.Mesh(geo.clone(), solidMat);
            domeSolid.renderOrder = 1;
            scene.add(domeSolid);

            // Wireframe dome - starts black, revealed by scan, with mouse glow and shockwave
            const wireGeo = new THREE.EdgesGeometry(geo, 1);
            const wireMat = new THREE.ShaderMaterial({
                uniforms: {
                    scanRadii: { value: new Float32Array(10) },
                    scanCount: { value: 0 },
                    revealRadius: { value: 0 },
                    wireframeReveal: { value: 0 },
                    fadeOut: { value: 0 },
                    lightDir: { value: LIGHT_DIR },
                    mouseWorld: { value: new THREE.Vector3() },
                    time: { value: 0 },
                    shockwaveTime: { value: 0 },
                    shockwaveActive: { value: 0 },
                    flickerIntensity: { value: 0 }
                },
                vertexShader: `
                    uniform float scanRadii[10];
                    uniform int scanCount;
                    uniform vec3 mouseWorld;
                    uniform float shockwaveTime;
                    uniform float shockwaveActive;
                    varying vec3 vPos, vWorldPos;
                    varying float vElev, vDist;
                    void main() {
                        vPos = position;
                        vElev = position.y;
                        vDist = length(position.xz);
                        vec4 wp = modelMatrix * vec4(position, 1.0);
                        vWorldPos = wp.xyz;
                        
                        float disp = 0.0;
                        for (int i = 0; i < 10; i++) {
                            if (i >= scanCount) break;
                            float sd = abs(vDist - scanRadii[i]);
                            disp += smoothstep(1.5, 0.0, sd) * 0.3;
                        }
                        
                        // Shockwave displacement - ripples outward from center
                        if (shockwaveActive > 0.5) {
                            float shockRadius = shockwaveTime * 30.0; // Shockwave expands outward
                            float shockDist = abs(length(position) - shockRadius);
                            float shockDisp = smoothstep(2.0, 0.0, shockDist) * 0.5 * (1.0 - shockwaveTime);
                            disp += shockDisp;
                        }
                        
                        vec3 p = position + normalize(position) * disp;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform float scanRadii[10];
                    uniform int scanCount;
                    uniform float revealRadius, wireframeReveal, fadeOut, time;
                    uniform float shockwaveTime, shockwaveActive, flickerIntensity;
                    uniform vec3 lightDir, mouseWorld;
                    varying vec3 vPos, vWorldPos;
                    varying float vElev, vDist;
                    void main() {
                        // Base brightness when fully revealed
                        float base = 0.55 + vElev * 0.02;
                        vec3 n = normalize(vPos);
                        float light = max(dot(n, lightDir), 0.0) * 0.2;
                        float fullBrightness = base + light;
                        
                        // Scan wave highlight from all active waves
                        float scanHighlight = 0.0;
                        for (int i = 0; i < 10; i++) {
                            if (i >= scanCount) break;
                            float sd = abs(vDist - scanRadii[i]);
                            scanHighlight += smoothstep(1.5, 0.0, sd) * 0.8;
                        }
                        scanHighlight = min(scanHighlight, 1.0);
                        
                        // Shockwave highlight - bright ring expanding outward
                        float shockHighlight = 0.0;
                        vec3 shockColor = vec3(0.4, 0.08, 0.08);
                        if (shockwaveActive > 0.5) {
                            float shockRadius = shockwaveTime * 30.0;
                            float shockDist = abs(length(vPos) - shockRadius);
                            shockHighlight = smoothstep(1.5, 0.0, shockDist) * (1.0 - shockwaveTime * 0.7);
                        }
                        
                        // Mouse proximity glow
                        float mouseDist = length(vWorldPos - mouseWorld);
                        float mouseGlow = smoothstep(25.0, 0.0, mouseDist) * 0.6;
                        // Add shimmer
                        float shimmer = sin(mouseDist * 0.5 - time * 3.0) * 0.5 + 0.5;
                        mouseGlow *= (0.7 + shimmer * 0.3);
                        
                        // Reveal based on whether scan has passed this point
                        float revealed = smoothstep(revealRadius - 5.0, revealRadius + 5.0, vDist);
                        revealed = 1.0 - revealed;
                        
                        // Flickering effect during reappearance
                        float flicker = flickerIntensity;
                        
                        // Blend between black and full color based on wireframeReveal with flicker
                        float colorBlend = wireframeReveal * flicker;
                        float b = mix(0.0, fullBrightness, colorBlend) * revealed + scanHighlight + mouseGlow + shockHighlight;
                        
                        // Add blue tint from shockwave
                        vec3 col = vec3(b) + shockColor * shockHighlight * 2.0;
                        
                        // Apply fadeOut
                        float alpha = (revealed * 0.7 + scanHighlight * 0.5 + mouseGlow * 0.8 + shockHighlight) * (1.0 - fadeOut);
                        alpha *= flicker; // Apply flicker to alpha too
                        
                        gl_FragColor = vec4(col, alpha);
                    }
                `,
                transparent: true
            });
            domeWireframe = new THREE.LineSegments(wireGeo, wireMat);
            domeWireframe.scale.setScalar(1.002);
            domeWireframe.renderOrder = 3;
            scene.add(domeWireframe);
        }

        function createTerrain() {
            const geo = new THREE.PlaneGeometry(CONFIG.terrain.size, CONFIG.terrain.size, CONFIG.terrain.segments, CONFIG.terrain.segments);
            const pos = geo.attributes.position.array;

            for (let i = 0; i < pos.length; i += 3) {
                const x = pos[i], y = pos[i + 1];
                const dist = Math.sqrt(x * x + y * y);

                let hm = smoothstep(CONFIG.terrain.flatRadius, CONFIG.terrain.flatRadius + CONFIG.terrain.transitionWidth, dist);

                let h = 0;
                let baseNoise = noise.noise2D(x * 0.008, y * 0.008);
                let midNoise = noise2.noise2D(x * 0.015, y * 0.015);

                let ridgeNoise1 = 1.0 - Math.abs(noise.noise2D(x * 0.012, y * 0.012));
                let ridgeNoise2 = 1.0 - Math.abs(noise2.noise2D(x * 0.025, y * 0.025));
                let ridgeNoise3 = 1.0 - Math.abs(noise3.noise2D(x * 0.05, y * 0.05));

                let ridges = ridgeNoise1 * ridgeNoise1 * 1.5;
                ridges += ridgeNoise2 * ridgeNoise2 * 0.6;
                ridges += ridgeNoise3 * ridgeNoise3 * 0.2;

                let valleyNoise = noise3.noise2D(x * 0.02, y * 0.02);
                let valleys = Math.pow(Math.abs(valleyNoise), 0.5) * Math.sign(valleyNoise);

                let detail1 = noise.noise2D(x * 0.06, y * 0.06) * 0.15;
                let detail2 = noise2.noise2D(x * 0.12, y * 0.12) * 0.08;
                let detail3 = noise3.noise2D(x * 0.25, y * 0.25) * 0.04;
                let detail4 = noise.noise2D(x * 0.5, y * 0.5) * 0.02;

                let erosion = noise2.noise2D(x * 0.08 + valleys * 2.0, y * 0.08 + valleys * 2.0) * 0.1;

                h = baseNoise * 0.5 + midNoise * 0.8;
                h += ridges * 1.2;
                h += valleys * 0.3;
                h += detail1 + detail2 + detail3 + detail4;
                h += erosion;

                h = Math.max(0, h);
                h = Math.pow(h, 1.1);

                let distanceFalloff = 1.0 - smoothstep(100.0, 250.0, dist) * 0.3;

                pos[i + 2] = h * CONFIG.terrain.noiseHeight * hm * distanceFalloff;
            }
            geo.computeVertexNormals();

            // Solid terrain - pitch black, high contrast with edge reflections and organic dissolve
            const solidMat = new THREE.ShaderMaterial({
                uniforms: {
                    cameraPos: { value: camera.position },
