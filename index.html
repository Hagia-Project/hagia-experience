        function createGallerySpace() {
            // Gallery - cylindrical space made of instanced cubes
            // Creates illusion that dissolve cubes form a gallery cylinder
            const galleryY = -600;
            const galleryGroup = new THREE.Group();
            galleryGroup.position.y = galleryY;
            worksSection.add(galleryGroup);

            // Store gallery data for animation
            window.galleryData = {
                group: galleryGroup,
                y: galleryY,
                workPlanes: [],
                cubeWalls: null,
                circularLines: [],
                cylinderRadius: 120 // Store for camera reference
            };

            // ===== CYLINDRICAL CUBE WALLS =====
            // Taller cylinder to fill the view completely
            const cylinderRadius = 20;
            const cylinderHeight = 120; // Much taller - no empty space
            const cubeSize = 0.5;

            // Calculate exact number of cubes needed for seamless wall
            const circumference = 2 * Math.PI * cylinderRadius;
            const cubesAroundCircumference = Math.ceil(circumference / cubeSize);
            const cubesVertical = Math.ceil(cylinderHeight / cubeSize);
            const totalCubes = cubesAroundCircumference * cubesVertical;

            // Store cylinder info
            window.galleryData.cylinderRadius = cylinderRadius;
            window.galleryData.cylinderHeight = cylinderHeight;
            window.galleryData.cubeSize = cubeSize;
            window.galleryData.cubesAround = cubesAroundCircumference;
            window.galleryData.cubesVertical = cubesVertical;

            // Create instanced mesh for cylinder walls
            const cubeGeo = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);

            // Material for instanced mesh - metallic reflective with transparency
            const cubeMaterial = new THREE.MeshStandardMaterial({
                color: 0xffffff,
                metalness: 0.9,
                roughness: 0.2,
                transparent: true,
                opacity: 0.7,
                envMapIntensity: 1.0
            });

            const cubeInstances = new THREE.InstancedMesh(cubeGeo, cubeMaterial, totalCubes);
            cubeInstances.castShadow = true;
            cubeInstances.receiveShadow = true;

            // Add lights for the gallery - more lights at upper side
            const galleryLight1 = new THREE.PointLight(0xffffff, 3, 80);
            galleryLight1.position.set(0, 90, 0);
            galleryLight1.castShadow = true;
            galleryLight1.shadow.mapSize.width = 512;
            galleryLight1.shadow.mapSize.height = 512;
            galleryGroup.add(galleryLight1);

            const galleryLight2 = new THREE.PointLight(0xffffff, 2.5, 70);
            galleryLight2.position.set(0, 70, 0);
            galleryGroup.add(galleryLight2);

            const galleryLight3 = new THREE.PointLight(0xffffff, 2, 60);
            galleryLight3.position.set(0, 50, 0);
            galleryGroup.add(galleryLight3);

            const galleryLight4 = new THREE.PointLight(0x440808, 1.5, 50);
            galleryLight4.position.set(0, 30, 0);
            galleryGroup.add(galleryLight4);

            const galleryLight5 = new THREE.PointLight(0xffffff, 1.5, 50);
            galleryLight5.position.set(0, 100, 0);
            galleryGroup.add(galleryLight5);

            // Ambient light for the gallery - brighter
            const galleryAmbient = new THREE.AmbientLight(0x333344, 0.8);
            galleryGroup.add(galleryAmbient);

            // Store base positions for displacement
            const basePositions = [];

            const dummy = new THREE.Object3D();
            const color = new THREE.Color();
            let instanceIndex = 0;

            // Cubes with randomized sizes forming cylinder
            for (let v = 0; v < cubesVertical; v++) {
                const y = v * cubeSize - 5;

                for (let h = 0; h < cubesAroundCircumference; h++) {
                    const angle = (h / cubesAroundCircumference) * Math.PI * 2;

                    // Final position on cylinder wall
                    const x = Math.cos(angle) * cylinderRadius;
                    const z = Math.sin(angle) * cylinderRadius;

                    // Random scale for each cube
                    const randomScale = 0.4 + Math.random() * 1.2; // 0.4 to 1.6

                    // Start position - far away from center, scattered
                    const startDistance = 150 + Math.random() * 100; // 150-250 units away
                    const startAngleOffset = (Math.random() - 0.5) * 1.5; // Random angle spread
                    const startY = y + (Math.random() - 0.5) * 200; // Scattered in Y
                    const startX = Math.cos(angle + startAngleOffset) * startDistance;
                    const startZ = Math.sin(angle + startAngleOffset) * startDistance;

                    // Random delay for staggered arrival (0 to 0.7)
                    const arrivalDelay = Math.random() * 0.7;

                    // Store base position with start position for animation
                    basePositions.push({
                        x, y, z, angle,
                        startX, startY, startZ,
                        arrivalDelay,
                        scale: randomScale,
                        randomOffset: Math.random() * 0.8 + 0.2,
                        randomDelay: Math.random() * 0.5,
                        currentDisplacement: 0,
                        targetDisplacement: 0
                    });

                    // Start cubes at their far positions
                    dummy.position.set(startX, startY, startZ);
                    dummy.rotation.set(0, angle, 0);
                    dummy.scale.set(randomScale * 0.1, randomScale * 0.1, randomScale * 0.1); // Start tiny

                    dummy.updateMatrix();
                    cubeInstances.setMatrixAt(instanceIndex, dummy.matrix);

                    // Set initial color to dark
                    color.setRGB(0.0, 0.0, 0.0);
                    cubeInstances.setColorAt(instanceIndex, color);

                    instanceIndex++;
                }
            }

            cubeInstances.instanceMatrix.needsUpdate = true;
            cubeInstances.instanceColor.needsUpdate = true;
            galleryGroup.add(cubeInstances);
            window.galleryData.cubeWalls = cubeInstances;
            window.galleryData.basePositions = basePositions;
            window.galleryData.dummy = new THREE.Object3D();
            window.galleryData.tempColor = new THREE.Color();

            // Mouse speed tracking
            window.galleryData.lastMouseX = 0;
            window.galleryData.lastMouseY = 0;
            window.galleryData.mouseSpeed = 0;

            // Create wireframe version for glow effect
            const wireGeo = new THREE.EdgesGeometry(cubeGeo);
            const wireMaterial = new THREE.LineBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0,
                linewidth: 1
            });

            // Create individual wireframe lines for each cube (stored for updating)
            const wireframes = [];
            for (let i = 0; i < basePositions.length; i++) {
                const base = basePositions[i];
                const wire = new THREE.LineSegments(wireGeo, wireMaterial.clone());
                wire.position.set(base.x, base.y, base.z);
                wire.rotation.set(0, base.angle, 0);
                wire.scale.set(base.scale, base.scale, base.scale);
                wire.visible = false; // Start hidden
                galleryGroup.add(wire);
                wireframes.push(wire);
            }
            window.galleryData.wireframes = wireframes;

            // ===== VERTICAL GLOWING LINES BEHIND WALLS =====
            const verticalLines = [];
            const numVerticalLines = 120; // Doubled - more lines for depth
            const lineRadius = cylinderRadius + 3; // Slightly behind the cube wall
            const lineHeight = cylinderHeight + 40; // Taller than cylinder

            for (let i = 0; i < numVerticalLines; i++) {
                const angle = (i / numVerticalLines) * Math.PI * 2;
                const x = Math.cos(angle) * lineRadius;
                const z = Math.sin(angle) * lineRadius;

                // Create vertical line
                const lineGeo = new THREE.BufferGeometry();
                const points = [
                    new THREE.Vector3(x, -20, z),
                    new THREE.Vector3(x, lineHeight, z)
                ];
                lineGeo.setFromPoints(points);

                const lineMat = new THREE.LineBasicMaterial({
                    color: 0xffffff,
                    transparent: true,
                    opacity: 0.15 + Math.random() * 0.1 // Slight variation
                });

                const line = new THREE.Line(lineGeo, lineMat);
                galleryGroup.add(line);
                verticalLines.push(line);
            }
            window.galleryData.verticalLines = verticalLines;

            // Floor cubes removed
            // Circular lines removed

            // Work planes are now handled by HTML overlay (works-panels-overlay)
            // Initialize empty workPlanes array for compatibility
            window.galleryData.workPlanes = [];
            window.galleryData.connectionLines = [];

            // Store hover state
            window.galleryData.hoveredWork = null;
            window.galleryData.hoverTransition = 0;

            // Particles removed
        }

        function smoothstep(e0, e1, x) {
            const t = Math.max(0, Math.min(1, (x - e0) / (e1 - e0)));
            return t * t * (3 - 2 * t);
        }

        function easeInOutCubic(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }
        function easeOutQuart(t) { return 1 - Math.pow(1 - t, 4); }

        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;

            // Update totem scene
            if (totemVisible) {
                updateTotem(time);
            }

            // Smooth lerp towards target scroll position
            smoothScrollProgress += (scrollProgress - smoothScrollProgress) * 0.06;

            // Update scan waves and their glow rings
            let maxActiveRadius = 0;
            const activeRadii = new Float32Array(10);
            let activeCount = 0;

            for (let i = scanWaves.length - 1; i >= 0; i--) {
                const wave = scanWaves[i];
                wave.radius += wave.speed * 0.016;

                // Calculate opacity based on progress (fade out as it expands)
                const progress = wave.radius / wave.maxRadius;
                const opacity = 1.0 - progress;

                // Update glow ring
                if (wave.ring) {
                    wave.ring.material.uniforms.radius.value = wave.radius;
                    wave.ring.material.uniforms.opacity.value = opacity;
                }

                if (wave.radius > wave.maxRadius) {
                    // Remove ring from scene
                    if (wave.ring) {
                        scene.remove(wave.ring);
                        wave.ring.geometry.dispose();
                        wave.ring.material.dispose();
                    }
                    scanWaves.splice(i, 1);
                } else {
                    maxActiveRadius = Math.max(maxActiveRadius, wave.radius);
                    if (activeCount < 10) {
                        activeRadii[activeCount] = wave.radius;
                        activeCount++;
                    }
                }
            }

            // Track maximum reveal radius (keeps growing, doesn't shrink)
            revealProgress = Math.max(revealProgress, maxActiveRadius);

            // Wireframe color tied to camera height - smooth transition
            // At top (scroll 0) = black, at bottom (scroll 1) = full color
            // Starts fading in at 20% scroll, full by 40%
            const targetReveal = smoothScrollProgress < 0.1 ? 0 : Math.min(1, (smoothScrollProgress - 0.1) / 0.15);
            wireframeReveal += (targetReveal - wireframeReveal) * 0.05;

            // Camera movement: four phases
            // Phase 1 (0-25% scroll): Descent from top to ground
            // Phase 2 (25-50% scroll): Rotate around dome 270 degrees
            // Phase 3 (50-62.5% scroll): Camera holds, scene dissolves
            // Phase 4 (62.5-100% scroll): Camera descends into new episode

            const descentEnd = 0.25;
            const rotationEnd = 0.50;
            const dissolveEnd = 0.625;

            // Calculate scene dissolve progress (0 = fully visible, 1 = fully dissolved)
            let sceneDissolve = 0;
            if (smoothScrollProgress > rotationEnd) {
                sceneDissolve = Math.min(1, (smoothScrollProgress - rotationEnd) / (dissolveEnd - rotationEnd));
            }

            if (smoothScrollProgress <= descentEnd) {
                // Phase 1: Descent
                const t = easeInOutCubic(smoothScrollProgress / descentEnd);
                camera.position.x = CONFIG.camera.startPosition.x + (CONFIG.camera.endPosition.x - CONFIG.camera.startPosition.x) * t;
                camera.position.y = CONFIG.camera.startPosition.y + (CONFIG.camera.endPosition.y - CONFIG.camera.startPosition.y) * t;
                camera.position.z = CONFIG.camera.startPosition.z + (CONFIG.camera.endPosition.z - CONFIG.camera.startPosition.z) * t;
                camera.lookAt(CONFIG.camera.lookAt.x, CONFIG.camera.lookAt.y, CONFIG.camera.lookAt.z);
            } else if (smoothScrollProgress <= rotationEnd) {
                // Phase 2: Rotation around dome
                const rotationProgress = (smoothScrollProgress - descentEnd) / (rotationEnd - descentEnd);
                const angle = rotationProgress * CONFIG.cameraRotation.totalAngle;

                // Start from z-positive (front), rotate clockwise
                camera.position.x = Math.sin(angle) * CONFIG.cameraRotation.radius;
                camera.position.y = CONFIG.cameraRotation.height;
                camera.position.z = Math.cos(angle) * CONFIG.cameraRotation.radius;
                camera.lookAt(CONFIG.camera.lookAt.x, CONFIG.camera.lookAt.y, CONFIG.camera.lookAt.z);
            } else if (smoothScrollProgress <= dissolveEnd) {
                // Phase 3: Camera holds position while scene dissolves
                const angle = CONFIG.cameraRotation.totalAngle;
                camera.position.x = Math.sin(angle) * CONFIG.cameraRotation.radius;
                camera.position.y = CONFIG.cameraRotation.height;
                camera.position.z = Math.cos(angle) * CONFIG.cameraRotation.radius;
                camera.lookAt(CONFIG.camera.lookAt.x, CONFIG.camera.lookAt.y, CONFIG.camera.lookAt.z);
            } else {
                // Phase 4: Scene fully dissolved, camera now descends
                const newEpisodeProgress = (smoothScrollProgress - dissolveEnd) / (1 - dissolveEnd);
                const t = easeInOutCubic(newEpisodeProgress);

                // Start from end of rotation position
                const angle = CONFIG.cameraRotation.totalAngle;
                const startX = Math.sin(angle) * CONFIG.cameraRotation.radius;
                const startZ = Math.cos(angle) * CONFIG.cameraRotation.radius;
                const startY = CONFIG.cameraRotation.height;

                // Descend towards center and down
                const endX = 0;
                const endZ = 0;
                const endY = -200;

                camera.position.x = startX + (endX - startX) * t;
                camera.position.y = startY + (endY - startY) * t;
                camera.position.z = startZ + (endZ - startZ) * t;

                // Look downward as we descend
                const lookY = CONFIG.camera.lookAt.y * (1 - t) + (camera.position.y - 50) * t;
                camera.lookAt(0, lookY, 0);
            }

            // Smooth mouse following
            smoothMousePos.x += (mousePos.x - smoothMousePos.x) * 0.03;
            smoothMousePos.y += (mousePos.y - smoothMousePos.y) * 0.03;

            // 1. Subtle camera parallax - adds depth perception
            const parallaxStrength = 2.0;
            targetCameraOffset.x = smoothMousePos.x * parallaxStrength;
            targetCameraOffset.y = smoothMousePos.y * parallaxStrength * 0.5;
            currentCameraOffset.x += (targetCameraOffset.x - currentCameraOffset.x) * 0.02;
            currentCameraOffset.y += (targetCameraOffset.y - currentCameraOffset.y) * 0.02;
            camera.position.x += currentCameraOffset.x;
            camera.position.y += currentCameraOffset.y;

            // 2. Dynamic sun direction - shadows shift subtly with mouse
            if (sunLight) {
                const baseSunX = 50;
                const baseSunY = 12;
                const sunShiftX = smoothMousePos.x * 30;
                const sunShiftY = smoothMousePos.y * 5;
                sunLight.position.x = baseSunX + sunShiftX;
                sunLight.position.y = Math.max(5, baseSunY + sunShiftY);

                // Update LIGHT_DIR to match sun position
                LIGHT_DIR.set(sunLight.position.x, sunLight.position.y, sunLight.position.z).normalize();

                // Update light direction in solid material shaders
                if (domeSolid && domeSolid.material.uniforms) {
                    domeSolid.material.uniforms.lightDir.value.copy(LIGHT_DIR);
                }
                if (terrainSolid && terrainSolid.material.uniforms) {
                    terrainSolid.material.uniforms.lightDir.value.copy(LIGHT_DIR);
                }
                if (floorSolid && floorSolid.material.uniforms) {
                    floorSolid.material.uniforms.lightDir.value.copy(LIGHT_DIR);
                }
            }

            // 3. Star field parallax - deeper layer moves slower
            if (starField) {
                starField.rotation.y = smoothMousePos.x * 0.02;
                starField.rotation.x = smoothMousePos.y * 0.01;

                // Stars fade in as camera descends - hidden at top, visible near ground
                const starFade = smoothstep(0.15, 0.4, smoothScrollProgress);
                starField.material.uniforms.starOpacity.value = starFade;
            }

            // 4. Calculate mouse world position for glow effect
            // Project mouse into 3D space on a plane at y=0
            const raycaster = new THREE.Raycaster();
            const mouseVec = new THREE.Vector2(smoothMousePos.x, smoothMousePos.y);
            raycaster.setFromCamera(mouseVec, camera);
            const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
            raycaster.ray.intersectPlane(groundPlane, mouseWorldPos);
            if (!mouseWorldPos) mouseWorldPos = new THREE.Vector3(0, 0, 0);

            // Update uniforms for wireframe shaders only
            if (domeWireframe && domeWireframe.material.uniforms) {
                domeWireframe.material.uniforms.scanRadii.value = activeRadii;
                domeWireframe.material.uniforms.scanCount.value = activeCount;
                domeWireframe.material.uniforms.revealRadius.value = revealProgress;
                domeWireframe.material.uniforms.wireframeReveal.value = wireframeReveal;
                domeWireframe.material.uniforms.mouseWorld.value.copy(mouseWorldPos);
                domeWireframe.material.uniforms.time.value = time;

                // Fade out dome wireframe as logo appears
                const fadeStart = 0.12;
                const fadeEnd = 0.25;
                const domeFadeOut = smoothstep(fadeStart, fadeEnd, smoothScrollProgress);
                domeWireframe.material.uniforms.fadeOut.value = domeFadeOut;
            }
            if (terrainWireframe) {
                terrainWireframe.material.uniforms.scanRadii.value = activeRadii;
                terrainWireframe.material.uniforms.scanCount.value = activeCount;
                terrainWireframe.material.uniforms.revealRadius.value = revealProgress;
                terrainWireframe.material.uniforms.wireframeReveal.value = wireframeReveal;
                terrainWireframe.material.uniforms.mouseWorld.value.copy(mouseWorldPos);
                terrainWireframe.material.uniforms.time.value = time;
            }
            if (floorWireframe) {
                floorWireframe.material.uniforms.scanRadii.value = activeRadii;
                floorWireframe.material.uniforms.scanCount.value = activeCount;
                floorWireframe.material.uniforms.revealRadius.value = revealProgress;
                floorWireframe.material.uniforms.wireframeReveal.value = wireframeReveal;
                floorWireframe.material.uniforms.mouseWorld.value.copy(mouseWorldPos);
                floorWireframe.material.uniforms.time.value = time;
            }

            // Animate HAGIA logo - appears when camera is close to landing
            if (hagiaLogo) {
                // Start appearing at 15% scroll, fully visible by 25%
                const logoAppearStart = 0.15;
                const logoAppearEnd = 0.25;
                const logoOpacity = smoothstep(logoAppearStart, logoAppearEnd, smoothScrollProgress);

                hagiaLogo.visible = logoOpacity > 0.01;

                // Reset SFX flag when logo is no longer visible (user scrolled back up)
                if (logoOpacity <= 0.01 && sfxDomePlayed) {
                    sfxDomePlayed = false;
                    // Restore background music if it was ducked
                    if (bgMusic && bgMusicPlaying && !audioMuted && bgMusic.volume < 0.35) {
                        fadeAudio(bgMusic, bgMusic.volume, 0.4, 1000);
                    }
                }

                // Play sfx.mp3 when dome first dissolves and logo starts appearing
                if (logoOpacity > 0.01 && !sfxDomePlayed && audioInitialized && !audioMuted) {
                    sfxDomePlayed = true;
                    playSfx(sfxDome);
                    // Slightly duck the background music during the reveal
                    if (bgMusic && bgMusicPlaying) fadeAudio(bgMusic, bgMusic.volume, 0.15, 1500);
                }

                // Dissolve dome solid mesh when logo starts appearing (keep wireframe)
                if (domeSolid && domeSolid.material.uniforms) {
                    // Dissolve starts slightly before logo appears and completes as logo is fully visible
                    const dissolveStart = 0.12;
                    const dissolveEnd = 0.25;
                    const dissolveProgress = smoothstep(dissolveStart, dissolveEnd, smoothScrollProgress);
                    domeSolid.material.uniforms.dissolveProgress.value = dissolveProgress;
                    domeSolid.material.uniforms.time.value = time;

                    // Only hide completely when fully dissolved
                    domeSolid.visible = dissolveProgress < 0.99;
                }

                // Make logo rotate slightly as camera rotates (not always facing camera)
                // This allows all parts to be seen better
                const cameraPos2D = new THREE.Vector2(camera.position.x, camera.position.z);
                const logoPos2D = new THREE.Vector2(hagiaLogo.position.x, hagiaLogo.position.z);
                const angleToCamera = Math.atan2(cameraPos2D.x - logoPos2D.x, cameraPos2D.y - logoPos2D.y);

                // Add a slight offset rotation (logo rotates slower than camera)
                // This creates a subtle rotation effect showing different angles
                const rotationOffset = angleToCamera * 0.3; // Logo rotates at 30% of camera's angular movement
                hagiaLogo.rotation.y = rotationOffset;

                // Logo stays on ground (no floating animation)

                // Scale in effect
                hagiaLogo.scale.setScalar(0.7 + logoOpacity * 0.3);

                // Animate scanning wireframe during rotation phase (after descent)
                const rotationStartLogo = 0.25;
                const rotationEndLogo = 0.50;
                if (hagiaLogoWireframe && smoothScrollProgress > rotationStartLogo && smoothScrollProgress <= rotationEndLogo) {
                    const rotationProgressLogo = (smoothScrollProgress - rotationStartLogo) / (rotationEndLogo - rotationStartLogo);
                    // Scan effect fades in at start of rotation, stays active
                    const scanIntensity = smoothstep(0, 0.3, rotationProgressLogo);

                    for (let i = 0; i < hagiaLogoWireframe.length; i++) {
                        const wireframe = hagiaLogoWireframe[i];
                        if (wireframe.material.uniforms) {
                            wireframe.material.uniforms.time.value = time;
                            wireframe.material.uniforms.scanProgress.value = scanIntensity;
                        }
                    }
                } else if (hagiaLogoWireframe) {
                    // Keep wireframe hidden before rotation
                    for (let i = 0; i < hagiaLogoWireframe.length; i++) {
                        const wireframe = hagiaLogoWireframe[i];
                        if (wireframe.material.uniforms) {
                            wireframe.material.uniforms.scanProgress.value = 0;
                        }
                    }
                }
            }

            // Animate billboards - rise from ground during rotation phase
            const descentEndForBillboards = 0.25;
            const rotationEndForBillboards = 0.50;
            if (smoothScrollProgress > descentEndForBillboards && smoothScrollProgress <= rotationEndForBillboards) {
                const billboardProgress = (smoothScrollProgress - descentEndForBillboards) / (rotationEndForBillboards - descentEndForBillboards);
                const riseAmount = easeOutQuart(Math.min(1, billboardProgress * 2.0));

                for (let i = 0; i < billboards.length; i++) {
                    const bb = billboards[i];
                    const startY = -CONFIG.billboards.height;
                    const targetY = bb.targetY;

                    // Position - rise up
                    bb.group.position.y = startY + (targetY - startY) * riseAmount;

                    // Calculate reveal based on how much is above ground
                    const aboveGround = Math.max(0, bb.group.position.y) / targetY;
                    const revealAmount = Math.min(1, aboveGround * 1.5);

                    // Update shader uniforms
                    bb.fill.material.uniforms.revealAmount.value = revealAmount;
                    bb.border.material.uniforms.revealAmount.value = revealAmount;

                    // Make billboard face the camera
                    bb.group.lookAt(camera.position.x, bb.group.position.y, camera.position.z);
                }
            } else if (smoothScrollProgress <= descentEndForBillboards) {
                // Keep billboards hidden below ground during descent
                for (let i = 0; i < billboards.length; i++) {
                    const bb = billboards[i];
                    bb.group.position.y = -CONFIG.billboards.height;
                    bb.fill.material.uniforms.revealAmount.value = 0;
                    bb.border.material.uniforms.revealAmount.value = 0;
                }
            }

            // Scene dissolve effect - everything fades out after rotation
            // Camera moves up, tilts down toward dome, wireframe flickers back, then descends through dome
            const sceneRotationEnd = 0.50;
            const sceneDissolveEnd = 0.625;

            if (smoothScrollProgress > sceneRotationEnd) {
                const dissolveProgress = Math.min(1, (smoothScrollProgress - sceneRotationEnd) / (sceneDissolveEnd - sceneRotationEnd));

                // Camera path: rotation ends -> rise up high -> move to dome top -> look down into dome
                const domeTopY = CONFIG.dome.radius + 2; // Just above dome top
                const highPointY = CONFIG.cameraRotation.height + 25; // Rise up high first

                // Start position (end of rotation)
                const startCamX = Math.sin(CONFIG.cameraRotation.totalAngle) * CONFIG.cameraRotation.radius;
                const startCamZ = Math.cos(CONFIG.cameraRotation.totalAngle) * CONFIG.cameraRotation.radius;
                const startCamY = CONFIG.cameraRotation.height;

                // Three phases:
                // Phase 1 (0-40%): Rise up high, tilting toward dome
                // Phase 2 (40-70%): Move toward dome center while staying high
                // Phase 3 (70-100%): Descend to dome top, look straight down - SHOCKWAVES HERE
                const phase1End = 0.4;
                const phase2End = 0.7;

                let camX, camY, camZ;

                if (dissolveProgress < phase1End) {
                    // Phase 1: Rise up high
                    const phase1Progress = dissolveProgress / phase1End;
                    const easeProgress = smoothstep(0, 1, phase1Progress);

                    camX = startCamX;
                    camZ = startCamZ;
                    camY = startCamY + (highPointY - startCamY) * easeProgress;

                    camera.position.set(camX, camY, camZ);
                    camera.lookAt(0, CONFIG.dome.radius * 0.5, 0);

                } else if (dissolveProgress < phase2End) {
                    // Phase 2: Move toward dome center while high
                    const phase2Progress = (dissolveProgress - phase1End) / (phase2End - phase1End);
                    const easeProgress = smoothstep(0, 1, phase2Progress);

                    camX = startCamX * (1 - easeProgress);
                    camZ = startCamZ * (1 - easeProgress);
                    camY = highPointY;

                    camera.position.set(camX, camY, camZ);
                    camera.lookAt(0, CONFIG.dome.radius * 0.3 * (1 - easeProgress), 0);

                } else {
                    // Phase 3: Descend to dome top, looking straight down - SHOCKWAVES INTENSIFY
                    const phase3Progress = (dissolveProgress - phase2End) / (1 - phase2End);
                    const easeProgress = smoothstep(0, 1, phase3Progress);

                    camX = 0;
                    camZ = 0;
                    camY = highPointY + (domeTopY - highPointY) * easeProgress;

                    camera.position.set(camX, camY, camZ);
                    camera.lookAt(0, -5 * easeProgress, 0); // Look more down as we descend
                }

                // DOME WIREFRAME - flickers back with shockwaves during dissolve
                if (domeWireframe && domeWireframe.material.uniforms) {
                    // Multi-frequency flickering effect
                    const flicker1 = Math.sin(time * 15) * 0.5 + 0.5;
                    const flicker2 = Math.sin(time * 27 + 1.5) * 0.5 + 0.5;
                    const flicker3 = Math.sin(time * 41 + 3.0) * 0.5 + 0.5;
                    const flickerIntensity = flicker1 * 0.4 + flicker2 * 0.35 + flicker3 * 0.25;

                    // Random glitch bursts
                    const glitchBurst = Math.random() > 0.92 ? 1.5 : 1.0;

                    // Wireframe fades in with flicker, synced with logo dissolve
                    const wireframeOpacity = dissolveProgress * flickerIntensity * glitchBurst;
                    domeWireframe.visible = true;
                    domeWireframe.material.uniforms.wireframeReveal.value = Math.min(1.0, wireframeOpacity);
                    domeWireframe.material.uniforms.flickerIntensity.value = flickerIntensity * glitchBurst;

                    // Shockwaves - ONLY in phase 3 when entering dome top
                    if (dissolveProgress > phase2End) {
                        const phase3Progress = (dissolveProgress - phase2End) / (1 - phase2End);
                        domeWireframe.material.uniforms.shockwaveActive.value = 1.0;
                        // Multiple intense shockwaves when entering
                        const shockwaveCycle = (phase3Progress * 5.0) % 1.0; // 5 rapid shockwaves
                        domeWireframe.material.uniforms.shockwaveTime.value = shockwaveCycle;
                    } else {
                        domeWireframe.material.uniforms.shockwaveActive.value = 0.0;
                        domeWireframe.material.uniforms.shockwaveTime.value = 0;
                    }

                    // Reset fadeOut during reappearance
                    domeWireframe.material.uniforms.fadeOut.value = 0;
                }

                // LOGO - mesh dissolves with artistic dissolution
                if (hagiaLogo) {
                    hagiaLogo.visible = dissolveProgress < 0.98;
                    hagiaLogo.traverse(function (child) {
                        if (child.isMesh && child.material) {
                            if (child.material.uniforms && child.material.uniforms.uTime) {
                                child.material.uniforms.uTime.value = dissolveProgress;
                            }
                            if (child.material.uniforms && child.material.uniforms.uAnimTime) {
                                child.material.uniforms.uAnimTime.value = time;
                            }
                            if (child.material.userData && child.material.userData.dissolveUniforms) {
                                child.material.userData.dissolveUniforms.dissolveProgress.value = dissolveProgress;
                                child.material.userData.dissolveUniforms.dissolveTime.value = time;
                            }
                        }
                    });
                }

                // Update logo wireframe dissolve
                if (hagiaLogoWireframe) {
                    for (let i = 0; i < hagiaLogoWireframe.length; i++) {
                        const wireframe = hagiaLogoWireframe[i];
                        if (wireframe.material.uniforms && wireframe.material.uniforms.dissolveProgress) {
                            wireframe.material.uniforms.dissolveProgress.value = dissolveProgress;
                        }
                    }
                }

                // TERRAIN - mesh dissolves
                if (terrainSolid && terrainSolid.material.uniforms) {
                    terrainSolid.visible = dissolveProgress < 0.95;
                    terrainSolid.material.uniforms.dissolveProgress.value = dissolveProgress;
                    terrainSolid.material.uniforms.time.value = time;
                }
                if (terrainWireframe && terrainWireframe.material.uniforms) {
                    terrainWireframe.visible = dissolveProgress < 0.7;
                    terrainWireframe.material.uniforms.dissolveProgress.value = dissolveProgress;
                }

                // TERRAIN FRAGMENTS - 3D cubes flying away
                if (window.terrainFragments && window.terrainFragments.material.uniforms) {
                    window.terrainFragments.visible = dissolveProgress > 0.05 && dissolveProgress < 0.98;
                    window.terrainFragments.material.uniforms.dissolveProgress.value = dissolveProgress;
                    window.terrainFragments.material.uniforms.time.value = time;
                }

                // FLOOR - mesh dissolves
                if (floorSolid && floorSolid.material.uniforms) {
                    floorSolid.visible = dissolveProgress < 0.95;
                    floorSolid.material.uniforms.dissolveProgress.value = dissolveProgress;
                    floorSolid.material.uniforms.time.value = time;
                }
                if (floorWireframe && floorWireframe.material.uniforms) {
                    floorWireframe.visible = dissolveProgress < 0.7;
                    floorWireframe.material.uniforms.dissolveProgress.value = dissolveProgress;
                }

                // BILLBOARDS - mesh dissolves with flickering fadeout
                for (let i = 0; i < billboards.length; i++) {
                    const bb = billboards[i];
                    bb.group.visible = dissolveProgress < 0.85;
                    if (bb.fill.material.uniforms) {
                        bb.fill.material.uniforms.dissolveProgress.value = dissolveProgress;
                        bb.fill.material.uniforms.time.value = time;
                    }
                    if (bb.border.material.uniforms) {
                        bb.border.material.uniforms.dissolveProgress.value = dissolveProgress;
                        bb.border.material.uniforms.time.value = time;
                    }
                }

                // Fade out stars during dissolve
                if (starField && starField.material.uniforms) {
                    const starFadeIn = smoothstep(0.15, 0.4, smoothScrollProgress);
                    starField.material.uniforms.starOpacity.value = starFadeIn * (1 - dissolveProgress);
                    starField.visible = dissolveProgress < 0.99;
                }

                // Fade out horizon glow
                if (horizonGlow) {
                    horizonGlow.visible = dissolveProgress < 0.3;
                }

                // Fade out haze planes
                if (haze) {
                    haze.visible = dissolveProgress < 0.1;
                }
                if (haze2) {
                    haze2.visible = dissolveProgress < 0.1;
                }

                // Fade out sun light
                if (sunLight) {
                    sunLight.intensity = 1.5 * (1 - dissolveProgress);
                }
            } else {
                // Ensure everything is visible and reset dissolve when scrolling back up

                if (terrainSolid && terrainSolid.material.uniforms) {
                    terrainSolid.material.uniforms.dissolveProgress.value = 0;
                    terrainSolid.visible = true;
                }
                if (terrainWireframe && terrainWireframe.material.uniforms) {
                    terrainWireframe.material.uniforms.dissolveProgress.value = 0;
                    terrainWireframe.visible = true;
                }
                // Hide terrain fragments when not dissolving
                if (window.terrainFragments) {
                    window.terrainFragments.visible = false;
                }
                if (floorSolid && floorSolid.material.uniforms) {
                    floorSolid.material.uniforms.dissolveProgress.value = 0;
                    floorSolid.visible = true;
                }
                if (floorWireframe && floorWireframe.material.uniforms) {
                    floorWireframe.material.uniforms.dissolveProgress.value = 0;
                    floorWireframe.visible = true;
                }
                if (horizonGlow) {
                    horizonGlow.visible = true;
                }
                if (haze) {
                    haze.visible = true;
                }
                if (haze2) {
                    haze2.visible = true;
                }
                if (sunLight) {
                    sunLight.intensity = 1.5;
                }
                for (let i = 0; i < billboards.length; i++) {
                    const bb = billboards[i];
                    bb.fill.material.uniforms.dissolveProgress.value = 0;
                    bb.border.material.uniforms.dissolveProgress.value = 0;
                    bb.group.visible = true;
                }
                // Reset logo
                if (hagiaLogo) {
                    hagiaLogo.traverse(function (child) {
                        if (child.isMesh && child.material) {
                            child.material.opacity = 1.0;
                        }
                    });
                    hagiaLogo.visible = true;
                }
                // Reset dome wireframe
                if (domeWireframe && domeWireframe.material.uniforms) {
                    domeWireframe.material.uniforms.wireframeReveal.value = 0;
                    domeWireframe.material.uniforms.shockwaveActive.value = 0;
                    domeWireframe.material.uniforms.shockwaveTime.value = 0;
                    domeWireframe.material.uniforms.flickerIntensity.value = 1.0;
                }
            }

            // ==================== GALLERY SECTION ====================
            // Camera descends to gallery after dissolve
            const galleryStart = 0.62;

            // Track gallery auto-progress
            if (!window.galleryAutoProgress) window.galleryAutoProgress = 0;
            if (!window.galleryActive) window.galleryActive = false;
            if (!window.galleryLanded) window.galleryLanded = false;

            // Allow scrolling back out of gallery
            if (smoothScrollProgress < galleryStart && window.galleryActive) {
                // User scrolled back - exit gallery
                window.galleryActive = false;
                window.galleryAutoProgress = 0;
                window.galleryLanded = false;
                window.galleryFormationStarted = false;
                window.galleryFormationProgress = 0;

                // Reset SFX flags so they can re-trigger
                sfxGalleryPlayed = false;

                // Crossfade back to background.mp3
                crossfadeToBg1();

                // Hide totem when leaving gallery
                const totemContainer = document.getElementById('totem-container');
                if (totemContainer) {
                    totemContainer.classList.remove('visible');
                    totemVisible = false;
                }

                // Hide work panels overlay
                showWorksPanels(false);
            }

            if (smoothScrollProgress > galleryStart && worksSection) {
                worksSection.visible = true;
                worksSectionActive = true;

                // Start automatic movement once we enter gallery
                if (!window.galleryActive && smoothScrollProgress > galleryStart) {
                    window.galleryActive = true;
                    window.galleryAutoProgress = 0;
                    window.galleryScrollBase = smoothScrollProgress;
                    window.galleryFormationStarted = false; // Track formation animation

                    // Play sfx_2.mp3 for gallery transition
                    if (!sfxGalleryPlayed && audioInitialized && !audioMuted) {
                        sfxGalleryPlayed = true;
                        playSfx(sfxGallery);
                    }
                    // Crossfade from background.mp3 to background_2.mp3
                    crossfadeToBg2();

                    // Show totem when entering gallery/tunnel
                    const totemContainer = document.getElementById('totem-container');
                    if (totemContainer) {
                        totemContainer.classList.add('visible');
                        totemVisible = true;
                    }

                    // Show work panels overlay
                    showWorksPanels(true);
                }

                // Auto-advance into gallery until landed
                if (window.galleryActive && window.galleryAutoProgress < 1) {
                    window.galleryAutoProgress += 0.012; // Speed of automatic descent
                }

                const galleryProgress = Math.min(1, window.galleryAutoProgress);
                const easedGProgress = easeOutQuart(galleryProgress);

                // Mark when we've landed and start formation animation
                if (easedGProgress > 0.95 && !window.galleryLanded) {
                    window.galleryLanded = true;
                    window.galleryScrollBase = smoothScrollProgress;
                    window.galleryFormationStarted = true;
                    window.galleryFormationProgress = 0; // Start formation from 0
                }

                // Animate formation after landing
                if (window.galleryFormationStarted && window.galleryFormationProgress < 1) {
                    window.galleryFormationProgress += 0.015; // Formation speed
                }

                // Gallery dimensions - taller cylinder
                const galleryY = -600;
                const cylinderHeight = 120; // Match the taller cylinder
                const galleryFloor = galleryY + 20; // Start higher in cylinder
                const galleryCeiling = galleryY + cylinderHeight - 20; // End lower in cylinder

                // Calculate scroll-based vertical position in gallery
                let scrollInGallery = 0;
                if (window.galleryLanded) {
                    const scrollSinceLanding = smoothScrollProgress - window.galleryScrollBase;
                    const remainingScroll = 1.0 - window.galleryScrollBase;
                    scrollInGallery = Math.max(0, Math.min(1, scrollSinceLanding / remainingScroll));
                }

                // Camera Y position: REVERSED - start at ceiling, scroll down to floor
                let camY;
                if (!window.galleryLanded) {
                    // Descending into gallery - land at TOP (ceiling)
                    const startCamY = CONFIG.dome.radius + 2;
                    const endCamY = galleryCeiling; // Land at ceiling instead of floor
                    camY = startCamY + (endCamY - startCamY) * easedGProgress;
                } else {
                    // Scroll through gallery - from ceiling DOWN to floor
                    camY = galleryCeiling - scrollInGallery * (galleryCeiling - galleryFloor);
                }

                // Camera stays fixed in center, only scroll changes height
                if (window.galleryLanded) {
                    // Fixed camera position - only Y changes with scroll
                    camera.position.set(0, camY, 0);
                    // Look straight ahead at the wall - no up or down tilt
                    camera.lookAt(0, camY, -20);

                    // Update HTML work panels scroll position
                    updateWorkPanelsScroll(scrollInGallery);
                } else {
                    // During descent - look at center of gallery
                    camera.position.set(0, camY, 0);
                    camera.lookAt(0, camY, -20);

                    // Reset work panels to initial position during descent
                    updateWorkPanelsScroll(0);
                }

                // ===== REVEAL GALLERY ELEMENTS =====
                if (window.galleryData) {
                    // JavaScript-based cube displacement with mouse
                    if (window.galleryData.cubeWalls && window.galleryData.basePositions) {
                        const cubeWalls = window.galleryData.cubeWalls;
                        const basePositions = window.galleryData.basePositions;
                        const dummy = window.galleryData.dummy;
                        const cRadius = window.galleryData.cylinderRadius;
                        const cylinderHeight = window.galleryData.cylinderHeight;

                        // Formation progress - starts after camera lands, uses dedicated progress variable
                        const formationProgress = window.galleryFormationProgress || 0;
                        const easedFormationGlobal = easeOutQuart(formationProgress);

                        // Simple direct mapping since camera is fixed at center
                        const angle = mousePos.x * Math.PI * 0.8;
                        const localCamY = camY - galleryY;
                        const heightRange = 20;

                        // Mouse target on cylinder wall
                        const mouseX = Math.sin(angle) * cRadius;
                        const mouseZ = -Math.cos(angle) * cRadius;
                        const mouseY = localCamY + mousePos.y * heightRange;

                        const mouseRadius = 8; // Larger radius
                        const displacementStrength = 5; // More aggressive displacement
                        const tempColor = window.galleryData.tempColor;
                        const wireframes = window.galleryData.wireframes;

                        // Update each cube instance
                        for (let i = 0; i < basePositions.length; i++) {
                            const base = basePositions[i];

                            // Calculate this cube's formation progress (staggered by arrivalDelay)
                            const cubeFormation = Math.max(0, Math.min(1, (easedFormationGlobal - base.arrivalDelay) / (1 - base.arrivalDelay)));
                            const easedFormation = cubeFormation * cubeFormation * (3 - 2 * cubeFormation); // smoothstep

                            // Interpolate from start position to final position
                            const currentX = base.startX + (base.x - base.startX) * easedFormation;
                            const currentY = base.startY + (base.y - base.startY) * easedFormation;
                            const currentZ = base.startZ + (base.z - base.startZ) * easedFormation;

                            // Scale grows as cube arrives
                            const currentScale = base.scale * (0.1 + 0.9 * easedFormation);

                            // Distance from mouse (only apply displacement after mostly formed)
                            let displacement = 0;
                            if (easedFormation > 0.8) {
                                const dx = base.x - mouseX;
                                const dy = base.y - mouseY;
                                const dz = base.z - mouseZ;
                                const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);

                                if (dist < mouseRadius) {
                                    const factor = 1 - (dist / mouseRadius);
                                    displacement = factor * factor * displacementStrength * (easedFormation - 0.8) * 5;
                                }
                            }

                            // Push inward from final position
                            const pushX = -base.x / cRadius * displacement;
                            const pushZ = -base.z / cRadius * displacement;

                            // Final position: interpolated position + displacement
                            const finalX = currentX + (easedFormation > 0.8 ? pushX : 0);
                            const finalZ = currentZ + (easedFormation > 0.8 ? pushZ : 0);

                            dummy.position.set(finalX, currentY, finalZ);
                            dummy.rotation.set(0, base.angle, 0);
                            dummy.scale.set(currentScale, currentScale, currentScale);
                            dummy.updateMatrix();
                            cubeWalls.setMatrixAt(i, dummy.matrix);

                            // Color: fade in as cube arrives + displacement glow
                            const ambientDim = 0.08 * easedFormation;
                            const brightness = displacement / displacementStrength;
                            const totalBrightness = Math.min(1, ambientDim + brightness);

                            tempColor.setRGB(totalBrightness, totalBrightness, totalBrightness + brightness * 0.1);
                            cubeWalls.setColorAt(i, tempColor);

                            // Update wireframe glow
                            if (wireframes && wireframes[i]) {
                                const wire = wireframes[i];
                                if (brightness > 0.05 && easedFormation > 0.8) {
                                    wire.visible = true;
                                    wire.position.set(finalX, currentY, finalZ);
                                    wire.scale.set(currentScale, currentScale, currentScale);
                                    wire.material.opacity = brightness * 1.5;
                                    wire.material.color.setRGB(0.35 + brightness * 0.2, 0.05 + brightness * 0.05, 0.05 + brightness * 0.05);
                                } else {
                                    wire.visible = false;
                                }
                            }
                        }

                        cubeWalls.instanceMatrix.needsUpdate = true;
                        cubeWalls.instanceColor.needsUpdate = true;

                        // Set material opacity for reveal
                        cubeWalls.material.opacity = easedGProgress * 0.7;
                    }

                    // Reveal vertical glowing lines
                    if (window.galleryData.verticalLines) {
                        const formProg = window.galleryFormationProgress || 0;
                        window.galleryData.verticalLines.forEach((line, idx) => {
                            const lineDelay = (idx / window.galleryData.verticalLines.length) * 0.3;
                            const lineReveal = Math.max(0, Math.min(1, (formProg - lineDelay) * 2));
                            line.material.opacity = lineReveal * (0.12 + Math.sin(time + idx) * 0.05);
                        });
                    }
                }

                // Gallery fog
                scene.fog.density = 0.002;

                camera.updateMatrixWorld();

            } else if (worksSection) {
                worksSection.visible = false;
                worksSectionActive = false;
                window.galleryActive = false;
                window.galleryAutoProgress = 0;
                window.galleryLanded = false;
                window.galleryScrollBase = 0;
                window.galleryFormationStarted = false;
                window.galleryFormationProgress = 0;

                // Reset gallery elements
                if (window.galleryData) {
                    // Reset cube walls
                    if (window.galleryData.cubeWalls && window.galleryData.cubeWalls.material.uniforms) {
                        window.galleryData.cubeWalls.material.uniforms.revealProgress.value = 0;
                    }

                    window.galleryData.workPlanes.forEach(wp => {
                        wp.plane.material.opacity = 0;
                        wp.border.material.opacity = 0;
                        wp.group.children.forEach(child => {
                            if (child.isLine) child.material.opacity = 0;
                        });
                    });
                    if (window.galleryData.circularLines) {
                        window.galleryData.circularLines.forEach(circle => {
                            circle.material.opacity = 0;
                        });
                    }
                }
            }

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.addEventListener('load', init);
    </script>
</body>

</html>
