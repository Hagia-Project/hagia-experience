                    vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
                    vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
                    vec4 permute(vec4 x) { return mod289(((x * 34.0) + 1.0) * x); }
                    vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
                    
                    float snoise(vec3 v) {
                        const vec2 C = vec2(1.0/6.0, 1.0/3.0);
                        const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
                        
                        vec3 i = floor(v + dot(v, C.yyy));
                        vec3 x0 = v - i + dot(i, C.xxx);
                        vec3 g = step(x0.yzx, x0.xyz);
                        vec3 l = 1.0 - g;
                        vec3 i1 = min(g.xyz, l.zxy);
                        vec3 i2 = max(g.xyz, l.zxy);
                        vec3 x1 = x0 - i1 + C.xxx;
                        vec3 x2 = x0 - i2 + C.yyy;
                        vec3 x3 = x0 - D.yyy;
                        
                        i = mod289(i);
                        vec4 p = permute(permute(permute(
                            i.z + vec4(0.0, i1.z, i2.z, 1.0))
                            + i.y + vec4(0.0, i1.y, i2.y, 1.0))
                            + i.x + vec4(0.0, i1.x, i2.x, 1.0));
                            
                        float n_ = 0.142857142857;
                        vec3 ns = n_ * D.wyz - D.xzx;
                        vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
                        vec4 x_ = floor(j * ns.z);
                        vec4 y_ = floor(j - 7.0 * x_);
                        vec4 x = x_ * ns.x + ns.yyyy;
                        vec4 y = y_ * ns.x + ns.yyyy;
                        vec4 h = 1.0 - abs(x) - abs(y);
                        vec4 b0 = vec4(x.xy, y.xy);
                        vec4 b1 = vec4(x.zw, y.zw);
                        vec4 s0 = floor(b0) * 2.0 + 1.0;
                        vec4 s1 = floor(b1) * 2.0 + 1.0;
                        vec4 sh = -step(h, vec4(0.0));
                        vec4 a0 = b0.xzyw + s0.xzyw * sh.xxyy;
                        vec4 a1 = b1.xzyw + s1.xzyw * sh.zzww;
                        vec3 p0 = vec3(a0.xy, h.x);
                        vec3 p1 = vec3(a0.zw, h.y);
                        vec3 p2 = vec3(a1.xy, h.z);
                        vec3 p3 = vec3(a1.zw, h.w);
                        vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
                        p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
                        vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                        m = m * m;
                        return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
                    }
                    
                    void main() {
                        // Use same noise as particles for matching dissolve
                        float noise = snoise(vWorldPos * noiseFreq) * 0.5 + 0.5;
                        
                        float progress = dissolveProgress * 1.2;
                        
                        // Discard dissolved pixels
                        if (noise < progress) {
                            discard;
                        }
                        
                        // Soft water-like edge glow - ONLY when dissolving
                        float edgeDist = noise - progress;
                        float edgeGlow = 0.0;
                        float innerGlow = 0.0;
                        vec3 glowColor = vec3(0.0);
                        
                        if (dissolveProgress > 0.01) {
                            edgeGlow = smoothstep(edgeWidth, 0.0, edgeDist);
                            innerGlow = smoothstep(edgeWidth * 0.5, 0.0, edgeDist);
                            glowColor = mix(vec3(0.6, 0.6, 0.65), vec3(1.0, 1.0, 1.0), innerGlow * 0.5);
                        }
                        
                        float fresnel = pow(1.0 - max(dot(vViewDir, vNormal), 0.0), 3.5);
                        float specular = pow(max(dot(reflect(-lightDir, vNormal), vViewDir), 0.0), 256.0);
                        
                        vec3 col = vec3(0.0);
                        col += vec3(specular * 0.7);
                        col += vec3(fresnel * 0.12);
                        col += glowColor * edgeGlow * 1.8;
                        
                        // Smooth fadeout as dissolve progresses
                        float dissolveFade = 1.0 - smoothstep(0.5, 0.95, dissolveProgress);
                        
                        float fade = smoothstep(280.0, 30.0, vDist) * 0.95 + 0.05;
                        gl_FragColor = vec4(col, 0.98 * fade * dissolveFade);
                    }
                `,
                transparent: true, side: THREE.FrontSide, depthWrite: true
            });
            floorSolid = new THREE.Mesh(geo.clone(), solidMat);
            floorSolid.rotation.x = -Math.PI / 2;
            floorSolid.position.y = -0.05;
            floorSolid.receiveShadow = true;
            floorSolid.renderOrder = 0;
            // scene.add(floorSolid); // REMOVED - not needed

            // Wireframe floor - starts black, revealed by scan, with mouse glow and dissolve
            const lineGeo = createGridLines(geo);
            const wireMat = new THREE.ShaderMaterial({
                uniforms: {
                    scanRadii: { value: new Float32Array(10) },
                    scanCount: { value: 0 },
                    revealRadius: { value: 0 },
                    wireframeReveal: { value: 0 },
                    dissolveProgress: { value: 0 },
                    lightDir: { value: LIGHT_DIR },
                    mouseWorld: { value: new THREE.Vector3() },
                    time: { value: 0 }
                },
                vertexShader: `
                    uniform float scanRadii[10];
                    uniform int scanCount;
                    varying float vDist;
                    varying vec3 vPos, vWorldPos;
                    void main() {
                        vDist = length(position.xy);
                        vPos = position;
                        vec4 wp = modelMatrix * vec4(position, 1.0);
                        vWorldPos = wp.xyz;
                        
                        float disp = 0.0;
                        for (int i = 0; i < 10; i++) {
                            if (i >= scanCount) break;
                            float sd = abs(vDist - scanRadii[i]);
                            disp += smoothstep(1.5, 0.0, sd) * 0.08;
                        }
                        
                        vec3 p = position; p.z += disp;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform float scanRadii[10];
                    uniform int scanCount;
                    uniform float revealRadius, wireframeReveal, dissolveProgress, time;
                    uniform vec3 mouseWorld;
                    varying float vDist;
                    varying vec3 vPos, vWorldPos;
                    
                    float hash(vec2 p) {
                        return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
                    }
                    
                    float noise(vec2 p) {
                        vec2 i = floor(p);
                        vec2 f = fract(p);
                        f = f * f * (3.0 - 2.0 * f);
                        float a = hash(i);
                        float b = hash(i + vec2(1.0, 0.0));
                        float c = hash(i + vec2(0.0, 1.0));
                        float d = hash(i + vec2(1.0, 1.0));
                        return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
                    }
                    
                    float fbm(vec2 p) {
                        float v = 0.0;
                        float a = 0.5;
                        for (int i = 0; i < 4; i++) {
                            v += a * noise(p);
                            p *= 2.0;
                            a *= 0.5;
                        }
                        return v;
                    }
                    
                    void main() {
                        // AURORA/CURTAIN dissolve - flowing wave patterns
                        float dist = length(vWorldPos.xz);
                        
                        // Create flowing aurora curtains
                        float wave1 = sin(vWorldPos.x * 0.04 + time * 0.8) * 0.5 + 0.5;
                        float wave2 = sin(vWorldPos.z * 0.05 - time * 0.6 + vWorldPos.x * 0.02) * 0.3 + 0.5;
                        float wave3 = cos(vWorldPos.x * 0.03 + vWorldPos.z * 0.03 + time * 0.4) * 0.2 + 0.5;
                        
                        // Combine with flowing noise
                        float flowNoise = fbm(vWorldPos.xz * 0.02 + vec2(time * 0.1, -time * 0.08));
                        float noiseVal = wave1 * 0.35 + wave2 * 0.25 + wave3 * 0.15 + flowNoise * 0.25;
                        
                        // Distance fade
                        float distBias = smoothstep(0.0, 150.0, dist) * 0.3;
                        noiseVal += distBias;
                        
                        // Smooth eased threshold
                        float t = dissolveProgress;
                        float threshold = t * t * 1.4;
                        
                        if (noiseVal < threshold) {
                            discard;
                        }
                        
                        // Soft aurora edge glow
                        float edgeDist = noiseVal - threshold;
                        float edgeGlow = smoothstep(0.1, 0.0, edgeDist) * dissolveProgress;
                        vec3 glowColor = vec3(0.8, 0.8, 0.85);
                        
                        float df = smoothstep(250.0, 15.0, vDist);
                        float base = 0.35;
                        float posLight = smoothstep(-100.0, 100.0, vPos.x) * 0.25;
                        float perspLight = smoothstep(120.0, -30.0, vPos.y) * 0.2;
                        float fullBrightness = (base + posLight + perspLight) * df;
                        
                        // Scan wave highlight from all active waves
                        float scanHighlight = 0.0;
                        for (int i = 0; i < 10; i++) {
                            if (i >= scanCount) break;
                            float sd = abs(vDist - scanRadii[i]);
                            scanHighlight += smoothstep(1.5, 0.0, sd) * 0.7;
                        }
                        scanHighlight = min(scanHighlight, 1.0);
                        
                        // Mouse proximity glow
                        float mouseDist = length(vWorldPos - mouseWorld);
                        float mouseGlow = smoothstep(35.0, 0.0, mouseDist) * 0.8;
                        // Add shimmer
                        float shimmer = sin(mouseDist * 0.3 - time * 2.0) * 0.5 + 0.5;
                        mouseGlow *= (0.5 + shimmer * 0.5);
                        
                        // Reveal based on whether scan has passed
                        float revealed = smoothstep(revealRadius - 8.0, revealRadius + 8.0, vDist);
                        revealed = 1.0 - revealed;
                        
                        // Smooth fadeout during dissolve
                        float dissolveFade = 1.0 - smoothstep(0.2, 0.7, dissolveProgress);
                        
                        // Blend to full color based on wireframeReveal
                        float b = mix(0.0, fullBrightness, wireframeReveal) * revealed + scanHighlight + mouseGlow;
                        
                        // Add edge glow color
                        vec3 finalColor = vec3(b) + glowColor * edgeGlow * 3.0;
                        
                        gl_FragColor = vec4(finalColor, (revealed * 0.6 + scanHighlight * 0.5 + mouseGlow * 0.9) * dissolveFade);
                    }
                `,
                transparent: true
            });

            floorWireframe = new THREE.LineSegments(lineGeo, wireMat);
            floorWireframe.rotation.x = -Math.PI / 2;
            floorWireframe.position.y = -0.03;

            // scene.add(floorWireframe); // REMOVED - not needed
        }

        function createGlowRing() {

        function createHagiaLogo() {

            const cubeRenderTarget = new THREE.WebGLCubeRenderTarget(256, {

                        vec3 groundColor = vec3(0.01, 0.01, 0.02);
                        vec3 horizonColor = vec3(0.2, 0.22, 0.28);
                        vec3 skyColor = vec3(0.6, 0.65, 0.7);
                        vec3 zenithColor = vec3(0.9, 0.92, 0.95);
                        
                        vec3 col;
                        if (y < 0.4) {
                            col = mix(groundColor, horizonColor, y / 0.4);
                        } else if (y < 0.6) {
                            col = mix(horizonColor, skyColor, (y - 0.4) / 0.2);
                        } else {
                            col = mix(skyColor, zenithColor, (y - 0.6) / 0.4);
                        }
                        
                        // Stronger, more defined light sources for crisp reflections
                        vec3 lightDir1 = normalize(vec3(1.0, 0.8, 0.5));
                        vec3 lightDir2 = normalize(vec3(-0.8, 0.6, -0.3));
                        vec3 lightDir3 = normalize(vec3(0.0, 1.0, 0.0));
                        vec3 lightDir4 = normalize(vec3(-0.5, 0.3, 1.0));
                        
                        float light1 = pow(max(dot(dir, lightDir1), 0.0), 48.0);

                        float light3 = pow(max(dot(dir, lightDir3), 0.0), 24.0);
                        float light4 = pow(max(dot(dir, lightDir4), 0.0), 64.0);
                        
                        col += vec3(1.0, 0.98, 0.95) * light1 * 3.5;
                        col += vec3(0.95, 0.98, 1.0) * light2 * 2.5;
                        col += vec3(1.0, 1.0, 1.0) * light3 * 1.5;
                        col += vec3(1.0, 1.0, 0.98) * light4 * 2.0;
                        
                        // Add subtle gradient bands for metallic interest
                        float bands = sin(dir.y * 20.0) * 0.03 + sin(dir.x * 15.0 + dir.z * 10.0) * 0.02;
                        col += bands;
                        
                        gl_FragColor = vec4(col, 1.0);
                    }
                `

            const envMesh = new THREE.Mesh(envGeo, envMat);
            envScene.add(envMesh);

            // Render environment to cubemap

                shader.fragmentShader = shader.fragmentShader.replace(

                    uniform float dissolveProgress;
                    uniform float dissolveTime;
                    uniform float noiseFreq;
                    uniform float edgeWidth;
                    uniform vec3 edgeColor;
                    varying vec3 vWorldPos;
                    
                    // 3D Simplex noise
                    vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
                    vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
                    vec4 permute(vec4 x) { return mod289(((x * 34.0) + 1.0) * x); }
                    vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
                    
                    float snoise(vec3 v) {
                        const vec2 C = vec2(1.0/6.0, 1.0/3.0);
                        const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
                        vec3 i = floor(v + dot(v, C.yyy));
                        vec3 x0 = v - i + dot(i, C.xxx);
                        vec3 g = step(x0.yzx, x0.xyz);
                        vec3 l = 1.0 - g;
                        vec3 i1 = min(g.xyz, l.zxy);
                        vec3 i2 = max(g.xyz, l.zxy);
                        vec3 x1 = x0 - i1 + C.xxx;
                        vec3 x2 = x0 - i2 + C.yyy;
                        vec3 x3 = x0 - D.yyy;
                        i = mod289(i);

                        float n_ = 0.142857142857;

                        vec4 x = x_ * ns.x + ns.yyyy;

                // Create artistic dissolution effect for each mesh
                obj.traverse(function (child) {
                    if (child.isMesh) {
                        // Keep the original geometry
                        let geometry = child.geometry;
                        if (geometry.index) {
                            geometry = geometry.toNonIndexed();
                        }

                        // Create detailed artistic dissolution shader material
                        const dissolveMat = new THREE.ShaderMaterial({
                            uniforms: {
                                uTime: logoDissolveUniforms.dissolveProgress,
                                uAnimTime: { value: 0 },
                                envMap: { value: envMap },
                                edgeColor: { value: new THREE.Color(0.7, 0.7, 0.75) },
                                glowColor: { value: new THREE.Color(0.5, 0.5, 0.55) }
                            },
                            vertexShader: `
                                varying vec3 vNormal;
                                varying vec3 vViewDir;
                                varying vec3 vWorldPos;
                                varying vec3 vLocalPos;
                                
                                void main() {
                                    vNormal = normalize(normalMatrix * normal);
                                    vec4 worldPos = modelMatrix * vec4(position, 1.0);
                                    vWorldPos = worldPos.xyz;
                                    vLocalPos = position;
                                    vViewDir = normalize(cameraPosition - worldPos.xyz);
                                    
                                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                                }
                            `,
                            fragmentShader: `
                                uniform samplerCube envMap;
                                uniform vec3 edgeColor;
                                uniform vec3 glowColor;
                                uniform float uTime;
                                uniform float uAnimTime;
                                
                                varying vec3 vNormal;
                                varying vec3 vViewDir;
                                varying vec3 vWorldPos;
                                varying vec3 vLocalPos;
                                
                                // Simplex noise for organic dissolution
                                vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
                                vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
                                vec4 permute(vec4 x) { return mod289(((x * 34.0) + 1.0) * x); }
                                vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
                                
                                float snoise(vec3 v) {
                                    const vec2 C = vec2(1.0/6.0, 1.0/3.0);
                                    const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
                                    
                                    vec3 i = floor(v + dot(v, C.yyy));
                                    vec3 x0 = v - i + dot(i, C.xxx);
                                    vec3 g = step(x0.yzx, x0.xyz);
                                    vec3 l = 1.0 - g;
                                    vec3 i1 = min(g.xyz, l.zxy);
                                    vec3 i2 = max(g.xyz, l.zxy);
                                    vec3 x1 = x0 - i1 + C.xxx;
                                    vec3 x2 = x0 - i2 + C.yyy;
                                    vec3 x3 = x0 - D.yyy;
                                    
                                    i = mod289(i);
                                    vec4 p = permute(permute(permute(
                                        i.z + vec4(0.0, i1.z, i2.z, 1.0))
                                        + i.y + vec4(0.0, i1.y, i2.y, 1.0))
                                        + i.x + vec4(0.0, i1.x, i2.x, 1.0));
                                        
                                    float n_ = 0.142857142857;
                                    vec3 ns = n_ * D.wyz - D.xzx;
                                    vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
                                    vec4 x_ = floor(j * ns.z);
                                    vec4 y_ = floor(j - 7.0 * x_);
                                    vec4 x = x_ * ns.x + ns.yyyy;
                                    vec4 y = y_ * ns.x + ns.yyyy;
                                    vec4 h = 1.0 - abs(x) - abs(y);
                                    vec4 b0 = vec4(x.xy, y.xy);
                                    vec4 b1 = vec4(x.zw, y.zw);
                                    vec4 s0 = floor(b0) * 2.0 + 1.0;
                                    vec4 s1 = floor(b1) * 2.0 + 1.0;
                                    vec4 sh = -step(h, vec4(0.0));
                                    vec4 a0 = b0.xzyw + s0.xzyw * sh.xxyy;
                                    vec4 a1 = b1.xzyw + s1.xzyw * sh.zzww;
                                    vec3 p0 = vec3(a0.xy, h.x);
                                    vec3 p1 = vec3(a0.zw, h.y);
                                    vec3 p2 = vec3(a1.xy, h.z);
                                    vec3 p3 = vec3(a1.zw, h.w);
                                    vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
                                    p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
                                    vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                                    m = m * m;
                                    return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
                                }
                                
                                // FBM for more detail
                                float fbm(vec3 p) {
                                    float value = 0.0;
                                    float amplitude = 0.5;
                                    float frequency = 1.0;
                                    for (int i = 0; i < 5; i++) {
                                        value += amplitude * snoise(p * frequency);
                                        amplitude *= 0.5;
                                        frequency *= 2.0;
                                    }
                                    return value;
                                }
                                
                                void main() {
                                    // Multi-layered noise for organic dissolution pattern
                                    float noise1 = snoise(vLocalPos * 2.0) * 0.5 + 0.5;
                                    float noise2 = snoise(vLocalPos * 5.0 + vec3(100.0)) * 0.5 + 0.5;
                                    float noise3 = fbm(vLocalPos * 3.0 + vec3(50.0));
                                    
                                    // Combine noises for complex pattern
                                    float combinedNoise = noise1 * 0.5 + noise2 * 0.3 + (noise3 * 0.5 + 0.5) * 0.2;
                                    
                                    // Add vertical bias - dissolve from top to bottom
                                    float verticalBias = (vLocalPos.y + 5.0) / 10.0; // Normalize based on logo height
                                    combinedNoise = combinedNoise * 0.7 + verticalBias * 0.3;
                                    
                                    // Dissolve threshold with smooth edge
                                    float dissolveThreshold = uTime * 1.3; // Overshoot to fully dissolve
                                    float edgeWidth = 0.08;
                                    
                                    // Check if this pixel should be dissolved
                                    if (combinedNoise < dissolveThreshold - edgeWidth) {
                                        discard;
                                    }
                                    
                                    vec3 normal = normalize(vNormal);
                                    vec3 viewDir = normalize(vViewDir);
                                    vec3 lightDir = normalize(vec3(0.5, 0.8, 0.3));
                                    
                                    // Reflective metallic material - high reflections
                                    float NdotL = max(dot(normal, lightDir), 0.0);
                                    float diffuse = NdotL * 0.7 + 0.3;
                                    
                                    // Very strong specular for highly reflective look
                                    vec3 reflectDir = reflect(-lightDir, normal);
                                    float spec1 = pow(max(dot(viewDir, reflectDir), 0.0), 32.0);
                                    float spec2 = pow(max(dot(viewDir, reflectDir), 0.0), 128.0);
                                    float spec3 = pow(max(dot(viewDir, reflectDir), 0.0), 512.0);
                                    float specular = spec1 * 1.5 + spec2 * 2.0 + spec3 * 2.5;
                                    
                                    // Strong fresnel for metallic edge reflection
                                    float fresnel = pow(1.0 - max(dot(viewDir, normal), 0.0), 2.5);
                                    
                                    // Environment reflection fake - stronger
                                    vec3 envReflect = reflect(-viewDir, normal);
                                    float envLight = smoothstep(-0.5, 1.0, envReflect.y) * 0.7;
                                    
                                    // Base pure black metallic color
                                    vec3 baseColor = vec3(0.02, 0.02, 0.02);
                                    
                                    vec3 col = baseColor * diffuse;
                                    col += vec3(specular);
                                    col += fresnel * vec3(0.4, 0.4, 0.4);
                                    col += envLight * vec3(0.3, 0.3, 0.3);
                                    
                                    // Clean white edge effect at dissolution boundary (no color)
                                    float edgeDist = combinedNoise - dissolveThreshold;
                                    float edgeGlow = smoothstep(edgeWidth, 0.0, edgeDist);
                                    
                                    // Pure white edge glow
                                    vec3 edgeCol = vec3(1.0, 1.0, 1.0);
                                    
                                    // Apply subtle edge glow
                                    col = mix(col, edgeCol, edgeGlow * 0.3);
                                    col += edgeCol * edgeGlow * 0.5; // Subtle emissive glow
                                    
                                    // Alpha - fully opaque except at very edge
                                    float alpha = 1.0;
                                    alpha = smoothstep(0.0, edgeWidth * 0.5, edgeDist);
                                    
                                    // Fade out near the end
                                    alpha *= 1.0 - smoothstep(0.85, 1.0, uTime);
                                    
                                    if (alpha < 0.01) discard;
                                    
                                    gl_FragColor = vec4(col, alpha);
                                }
                            `,
                            transparent: true,
                            side: THREE.DoubleSide,
                            depthWrite: true
                        });

                        dissolveMat.userData.dissolveUniforms = logoDissolveUniforms;

                        child.geometry = geometry;
                        child.material = dissolveMat;
                    }
                });

                // Get bounding box to center and scale
                const box = new THREE.Box3().setFromObject(obj);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());

                console.log('Model size:', size);
                console.log('Model center:', center);

                // Center horizontally, but place bottom on floor
                obj.position.x = -center.x;
                obj.position.z = -center.z;
                obj.position.y = -box.min.y; // Move up so bottom is at y=0

                // Scale to fit dome (target width ~20 units)
                const maxDim = Math.max(size.x, size.y, size.z);
                const targetSize = 20;
                const scale = targetSize / maxDim;
                obj.scale.setScalar(scale);

                // Adjust Y position after scaling to keep bottom on floor
                obj.position.y = (-box.min.y) * scale;

                hagiaLogo.add(obj);

            });

            // Position inside dome - on the ground
            hagiaLogo.position.set(0, 0, 0);
            hagiaLogo.visible = false;

            scene.add(hagiaLogo);
        }


        function createBillboards() {
            const cfg = CONFIG.billboards;

            for (let i = 0; i < cfg.count; i++) {
                // Distribute evenly around full circle
                const arcSpread = cfg.arcSpread || Math.PI * 2;
                // For full circle, divide by count (not count-1) to avoid overlap
                const angle = (i / cfg.count) * arcSpread;
                const x = Math.sin(angle) * cfg.radius;
                const z = Math.cos(angle) * cfg.radius;

                // Create billboard group
                const group = new THREE.Group();
                group.position.set(x, -cfg.height, z); // Start below ground
                group.lookAt(0, group.position.y, 0); // Face the dome

                // Shader material with texture and flickering dissolve
                const fillGeo = new THREE.PlaneGeometry(cfg.width, cfg.height);
                const fillMat = new THREE.ShaderMaterial({
                    uniforms: {
                        revealAmount: { value: 0.0 },
                        dissolveProgress: { value: 0.0 },
                        time: { value: 0.0 },
                        billboardIndex: { value: i * 1.0 },
                        billboardTexture: { value: billboardTextures[i] }
                    },
                    vertexShader: `
                        varying vec2 vUv;
                        varying vec3 vWorldPos;
                        void main() {
                            vUv = uv;
                            vec4 wp = modelMatrix * vec4(position, 1.0);
                            vWorldPos = wp.xyz;
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                        }
                    `,
                    fragmentShader: `
                        uniform float revealAmount;
                        uniform float dissolveProgress;
                        uniform float time;
                        uniform float billboardIndex;
                        uniform sampler2D billboardTexture;
                        varying vec2 vUv;
                        varying vec3 vWorldPos;
                        
                        float hash(vec2 p) {
                            return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
                        }
                        
                        float noise(vec2 p) {
                            vec2 i = floor(p);
                            vec2 f = fract(p);
                            f = f * f * (3.0 - 2.0 * f);
                            float a = hash(i);
                            float b = hash(i + vec2(1.0, 0.0));
                            float c = hash(i + vec2(0.0, 1.0));
                            float d = hash(i + vec2(1.0, 1.0));
                            return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
                        }
                        
                        void main() {
                            // Sample the texture
                            vec4 texColor = texture2D(billboardTexture, vUv);
                            
                            // Flickering effect during dissolve
                            float flickerSpeed = 15.0 + billboardIndex * 2.0;
                            float flicker1 = sin(time * flickerSpeed) * 0.5 + 0.5;
                            float flicker2 = sin(time * flickerSpeed * 1.7 + billboardIndex) * 0.5 + 0.5;
                            float flicker3 = sin(time * flickerSpeed * 2.3 + vUv.x * 10.0) * 0.5 + 0.5;
                            float flicker = flicker1 * 0.4 + flicker2 * 0.3 + flicker3 * 0.3;
                            
                            // Random glitch lines
                            float glitchLine = step(0.97, noise(vec2(vUv.y * 50.0 + time * 20.0, billboardIndex)));
                            
                            // Dissolve from edges - corners first
                            float edgeDist = min(min(vUv.x, 1.0 - vUv.x), min(vUv.y, 1.0 - vUv.y)) * 2.0;
                            float cornerBias = 1.0 - edgeDist;
                            
                            // Combine with noise
                            float noiseVal = noise(vUv * 8.0 + billboardIndex * 3.7);
                            float dissolveVal = noiseVal * 0.5 + cornerBias * 0.5;
                            
                            // Use higher multiplier to ensure full dissolve
                            float threshold = dissolveProgress * 1.8;
                            if (dissolveVal < threshold || dissolveProgress > 0.85) {
                                discard;
                            }
                            
                            // Smooth fadeout
                            float fadeout = 1.0 - smoothstep(0.3, 0.8, dissolveProgress);
                            
                            // Apply flicker only during dissolve
                            float flickerAmount = smoothstep(0.0, 0.5, dissolveProgress) * (1.0 - smoothstep(0.7, 1.0, dissolveProgress));
                            float flickerFade = mix(1.0, flicker * 0.5 + 0.5, flickerAmount);
                            
                            // Edge glow
                            float edgeGlowDist = dissolveVal - threshold;
                            float edgeGlow = smoothstep(0.12, 0.0, edgeGlowDist) * dissolveProgress;
                            vec3 glowColor = vec3(0.6, 0.8, 1.0);
                            
                            // Use texture color, fading from black to full color based on revealAmount
                            vec3 color = texColor.rgb * revealAmount;
                            color += glowColor * edgeGlow * 2.0;
                            color += vec3(glitchLine * flickerAmount * 0.5);
                            
                            float alpha = revealAmount * texColor.a * fadeout * flickerFade;
                            if (alpha < 0.01) discard;
                            gl_FragColor = vec4(color, alpha);
                        }
                    `,
                    transparent: true,
                    side: THREE.DoubleSide
                });
                const fill = new THREE.Mesh(fillGeo, fillMat);
                group.add(fill);

                // Border with same shader and flickering dissolve
                const borderVertices = [
                    -cfg.width / 2, -cfg.height / 2, 0.01,
                    cfg.width / 2, -cfg.height / 2, 0.01,
                    cfg.width / 2, cfg.height / 2, 0.01,
                    -cfg.width / 2, cfg.height / 2, 0.01,
                    -cfg.width / 2, -cfg.height / 2, 0.01
                ];
                const borderGeo = new THREE.BufferGeometry();
                borderGeo.setAttribute('position', new THREE.Float32BufferAttribute(borderVertices, 3));
                const borderMat = new THREE.ShaderMaterial({
                    uniforms: {
                        revealAmount: { value: 0.0 },
                        dissolveProgress: { value: 0.0 },
                        time: { value: 0.0 },
                        billboardIndex: { value: i * 1.0 }
                    },
                    vertexShader: `
                        varying vec3 vWorldPos;
                        varying float vLinePos;
                        attribute float linePosition;
                        void main() {
                            vec4 wp = modelMatrix * vec4(position, 1.0);
                            vWorldPos = wp.xyz;
                            vLinePos = float(gl_VertexID) / 4.0;
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                        }
                    `,
                    fragmentShader: `
                        uniform float revealAmount;
                        uniform float dissolveProgress;
                        uniform float time;
                        uniform float billboardIndex;
                        varying vec3 vWorldPos;
                        varying float vLinePos;
                        
                        float hash(float n) {
                            return fract(sin(n) * 43758.5453);
                        }
                        
                        void main() {
                            // Force discard when dissolve is nearly complete
                            if (dissolveProgress > 0.85) discard;
                            
                            // Flickering effect
                            float flickerSpeed = 20.0 + billboardIndex * 3.0;
                            float flicker1 = sin(time * flickerSpeed + vLinePos * 10.0) * 0.5 + 0.5;
                            float flicker2 = sin(time * flickerSpeed * 1.5 + billboardIndex * 2.0) * 0.5 + 0.5;
                            float flicker = flicker1 * 0.6 + flicker2 * 0.4;
                            
                            // Random segment dropout
                            float segmentNoise = hash(floor(vLinePos * 20.0 + time * 5.0) + billboardIndex);
                            float dropout = step(dissolveProgress * 1.8, segmentNoise);
                            
                            // Smooth fadeout
                            float fadeout = 1.0 - smoothstep(0.2, 0.7, dissolveProgress);
                            
                            // Apply flicker during dissolve
                            float flickerAmount = smoothstep(0.0, 0.3, dissolveProgress);
                            float flickerFade = mix(1.0, flicker * 0.3 + 0.7, flickerAmount);
                            
                            vec3 color = vec3(revealAmount * 0.7);
                            float alpha = revealAmount * 0.8 * fadeout * flickerFade * dropout;
                            
                            if (alpha < 0.05) discard;
                            gl_FragColor = vec4(color, alpha);
                        }
                    `,
                    transparent: true
                });
                const border = new THREE.Line(borderGeo, borderMat);
                group.add(border);

                scene.add(group);
                billboards.push({
                    group: group,
                    fill: fill,
                    border: border,
                    angle: angle,
                    x: x,
                    z: z,
                    targetY: cfg.targetHeight
                });
            }
        }

        // Function to add 3D logo model to a specific billboard
        function addLogoToBillboard(billboardIndex, objUrl) {
            if (billboardIndex < 0 || billboardIndex >= billboards.length) {
                console.error('Invalid billboard index:', billboardIndex);
                return;
            }

            const bb = billboards[billboardIndex];
            const cfg = CONFIG.billboards;

            // Check if it's an FBX file
            const isFBX = objUrl.toLowerCase().endsWith('.fbx');
            const loader = isFBX ? new THREE.FBXLoader() : new THREE.OBJLoader();

            loader.load(objUrl, function (obj) {
                // Calculate bounding box to fit the model
                const box = new THREE.Box3().setFromObject(obj);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());

                // Debug: count meshes and vertices
                let meshCount = 0;
                let vertexCount = 0;
                obj.traverse(function (child) {
                    if (child.isMesh) {
                        meshCount++;
                        if (child.geometry.attributes.position) {
                            vertexCount += child.geometry.attributes.position.count;
                        }
                    }
                });
                console.log('Logo', billboardIndex, objUrl, '- meshes:', meshCount, 'vertices:', vertexCount, 'size:', size.x.toFixed(2), size.y.toFixed(2), size.z.toFixed(2));

                // Scale to fit inside billboard - make logos bigger
                const scaleX = (cfg.width * 1.2) / size.x;
                const scaleY = (cfg.height * 1.2) / size.y;
                const scale = Math.min(scaleX, scaleY);

                obj.scale.set(scale, scale, scale);

                // Center the model
                obj.position.set(
                    -center.x * scale,
                    -center.y * scale,
                    0.5
                );

                // Apply white reflective material
                const logoMaterial = new THREE.ShaderMaterial({
                    uniforms: {
                        lightDir: { value: new THREE.Vector3(0.5, 0.8, 0.3).normalize() },
                        time: { value: 0.0 }
                    },
                    vertexShader: `
                        varying vec3 vNormal;
                        varying vec3 vViewDir;
                        varying vec3 vWorldPos;
                        
                        void main() {
                            vNormal = normalize(normalMatrix * normal);
                            vec4 worldPos = modelMatrix * vec4(position, 1.0);
                            vWorldPos = worldPos.xyz;
                            vViewDir = normalize(cameraPosition - worldPos.xyz);
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                        }
                    `,
                    fragmentShader: `
                        uniform vec3 lightDir;
                        uniform float time;
                        
                        varying vec3 vNormal;
                        varying vec3 vViewDir;
                        varying vec3 vWorldPos;
                        
                        void main() {
                            vec3 normal = normalize(vNormal);
                            vec3 viewDir = normalize(vViewDir);
                            
                            // Reflective metallic material
                            float NdotL = max(dot(normal, lightDir), 0.0);
                            float diffuse = NdotL * 0.4 + 0.15;
                            
                            // Strong specular for reflective look
                            vec3 reflectDir = reflect(-lightDir, normal);
                            float spec1 = pow(max(dot(viewDir, reflectDir), 0.0), 64.0);
                            float spec2 = pow(max(dot(viewDir, reflectDir), 0.0), 256.0);
                            float specular = spec1 * 0.6 + spec2 * 0.8;
                            
                            // Fresnel for metallic edge reflection
                            float fresnel = pow(1.0 - max(dot(viewDir, normal), 0.0), 3.0);
                            
                            // Environment reflection fake
                            vec3 envReflect = reflect(-viewDir, normal);
                            float envLight = smoothstep(-0.5, 1.0, envReflect.y) * 0.3;
                            
                            // White base color
                            vec3 baseColor = vec3(0.95, 0.95, 0.95);
                            
                            vec3 col = baseColor * diffuse;
                            col += vec3(specular);
                            col += fresnel * vec3(0.2, 0.2, 0.2);
                            col += envLight * vec3(0.15, 0.15, 0.15);
                            
                            gl_FragColor = vec4(col, 1.0);
                        }
                    `,
                    side: THREE.DoubleSide
                });

                // Store material reference for time update
                bb.logoMaterial = logoMaterial;

                obj.traverse(function (child) {
                    if (child.isMesh) {
                        child.material = logoMaterial;
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                bb.group.add(obj);
                bb.logo3D = obj;
                billboardLogos[billboardIndex] = obj;

                // Hide the rectangle (fill plane and border) since we have 3D logo
                bb.fill.visible = false;
                bb.border.visible = false;

                console.log('3D logo added to billboard', billboardIndex);
            });
        }

                const box = new THREE.Box3().setFromObject(obj);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());

                // Scale to fit view
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 15 / maxDim;
                obj.scale.setScalar(scale);

                // Center the model
                obj.position.set(-center.x * scale, -center.y * scale, -center.z * scale);

                // Rotate model to lay flat (top view) - looking down at it
                obj.rotation.x = Math.PI / 2;

                // Apply black reflective material with increased light response
                const totemMaterial = new THREE.ShaderMaterial({
                    uniforms: {
                        lightDir: { value: new THREE.Vector3(0.5, 0.8, 0.3).normalize() }
                    },
                    vertexShader: `
                        varying vec3 vNormal;
                        varying vec3 vViewDir;
                        
                        void main() {
                            vNormal = normalize(normalMatrix * normal);
                            vec4 worldPos = modelMatrix * vec4(position, 1.0);
                            vViewDir = normalize(cameraPosition - worldPos.xyz);
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                        }
                    `,
                    fragmentShader: `
                        uniform vec3 lightDir;
                        
                        varying vec3 vNormal;
                        varying vec3 vViewDir;
                        
                        void main() {
                            vec3 normal = normalize(vNormal);
                            vec3 viewDir = normalize(vViewDir);
                            
                            float NdotL = max(dot(normal, lightDir), 0.0);
                            float diffuse = NdotL * 0.6 + 0.25;
                            
                            vec3 reflectDir = reflect(-lightDir, normal);
                            float spec1 = pow(max(dot(viewDir, reflectDir), 0.0), 64.0);
                            float spec2 = pow(max(dot(viewDir, reflectDir), 0.0), 256.0);
                            float specular = spec1 * 1.0 + spec2 * 1.5;
                            
                            float fresnel = pow(1.0 - max(dot(viewDir, normal), 0.0), 3.0);
                            
                            vec3 envReflect = reflect(-viewDir, normal);
                            float envLight = smoothstep(-0.5, 1.0, envReflect.y) * 0.5;
                            
                            vec3 baseColor = vec3(0.02, 0.02, 0.02);
                            
                            vec3 col = baseColor * diffuse;
                            col += vec3(specular);
                            col += fresnel * vec3(0.25, 0.25, 0.25);
                            col += envLight * vec3(0.2, 0.2, 0.2);
                            
                            gl_FragColor = vec4(col, 1.0);
                        }
                    `,
                    side: THREE.DoubleSide
                });

                obj.traverse(function (child) {
                    if (child.isMesh) {
                        child.material = totemMaterial;
                    }
                });

                totemLogo = obj;
                totemScene.add(obj);

                // Store base rotation for tilt calculations
                window.totemBaseRotation = { x: Math.PI / 2, y: 0, z: 0 };
            });
        }

        function updateTotem(time) {
            if (!totemLogo || !totemRenderer) return;

            // Tilt based on mouse position (mousePos is already normalized -1 to 1)
            const tiltAmount = 0.3; // Max tilt in radians
            const targetTiltX = window.totemBaseRotation.x + mousePos.y * tiltAmount;
            const targetTiltY = window.totemBaseRotation.y + mousePos.x * tiltAmount;

            // Smooth lerp to target tilt
            totemLogo.rotation.x += (targetTiltX - totemLogo.rotation.x) * 0.08;
            totemLogo.rotation.y += (targetTiltY - totemLogo.rotation.y) * 0.08;

            // Render totem scene
            totemRenderer.render(totemScene, totemCamera);
        }

        // Update work panels positions based on gallery scroll
        function updateWorkPanelsScroll(scrollProgress) {
            if (!window.workPanelsData) return;

            const panelHeight = 260;
            const verticalGap = 300;
            const totalHeight = 6 * (panelHeight + verticalGap); // Height of tallest column
            const viewportHeight = window.innerHeight;

            // REVERSED: scrollProgress 0 = panels at top, scrollProgress 1 = panels scrolled up
            const scrollOffset = scrollProgress * (totalHeight + viewportHeight * 0.3);
            const startY = viewportHeight * 0.1; // Start position from top of viewport

            window.workPanelsData.forEach((data, index) => {
                const y = startY + data.baseY - scrollOffset;
                data.element.style.top = y + 'px';

                // Fade out panels that are off screen
                const opacity = (y > -260 && y < viewportHeight + 50) ? 1 : 0;
                data.element.style.opacity = opacity;
            });

            // Update connection lines positions
            if (window.connectionLinesData) {
                window.connectionLinesData.forEach(data => {
                    const y = startY + data.baseY - scrollOffset;
                    data.element.style.top = y + 'px';

                    // Fade out lines that are off screen
                    const opacity = (y > -300 && y < viewportHeight + 50) ? 1 : 0;
                    data.element.style.opacity = opacity;
                });
            }
        }
